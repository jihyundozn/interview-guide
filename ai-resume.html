<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 이력서 분석</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: #1e293b;
        background: linear-gradient(135deg, #edf5ff 0%, #dcecff 40%, #eef3ff 100%);
      }
      body { min-height: 100vh; }
      button, input, textarea, select { font: inherit; }
      .bg-orb-1, .bg-orb-2, .bg-orb-3 {
        position: fixed;
        pointer-events: none;
        filter: blur(40px);
        z-index: 0;
      }
      .bg-orb-1 {
        top: -80px; left: -80px; width: 340px; height: 340px; border-radius: 48px;
        background: radial-gradient(circle at top left, rgba(255, 232, 246, 0.65), rgba(255, 255, 255, 0) 70%);
      }
      .bg-orb-2 {
        top: 40px; right: 0; width: 420px; height: 420px; border-radius: 999px;
        background: radial-gradient(circle, rgba(176, 213, 255, 0.35), rgba(255, 255, 255, 0) 70%);
      }
      .bg-orb-3 {
        bottom: 0; left: 30%; width: 300px; height: 300px; border-radius: 999px;
        background: radial-gradient(circle, rgba(220, 236, 255, 0.55), rgba(255, 255, 255, 0) 72%);
      }
      .app-shell { position: relative; z-index: 1; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>
    <div id="app" class="app-shell"></div>

    <script src="interview-data.js"></script>
    <script>
      const VERCEL_APP_URL = "https://interview-guide-roan.vercel.app";

      if (window.location.hostname.includes("github.io")) {
        const currentPath = window.location.pathname || "/";
        const currentSearch = window.location.search || "";
        const currentHash = window.location.hash || "";
        const normalizedPath = currentPath.replace(/^\/interview-guide/, "") || "/";
        window.location.replace(`${VERCEL_APP_URL}${normalizedPath}${currentSearch}${currentHash}`);
      }

      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }

      const app = document.getElementById("app");
      const POSITION_CONTEXT_CACHE_KEY = "dozn_ai_position_contexts_cache_v1";
      const CANDIDATE_STORAGE_KEY = "dozn_interview_candidates_v1";
      const CUSTOM_QUESTION_STORAGE_KEY = "dozn_interview_custom_questions_v2";
      const ANALYSIS_HISTORY_STORAGE_KEY = "dozn_ai_resume_analysis_history_v1";

      let selectedPositionId = new URLSearchParams(window.location.search).get("positionId") || window.INTERVIEW_DATA.positions[0]?.id || "";
      let candidateName = "";
      let resumeText = "";
      let resumePdfBase64 = "";
      let resumePdfName = "";
      let resumePdfMimeType = "application/pdf";
      let isAnalyzing = false;
      let isPdfParsing = false;
      let errorMessage = "";
      let selectedQuestionIds = {};
      let analysisResult = null;
      let contextDraft = null;
      let currentAnalysisHistoryId = "";
      let isPositionContextOpen = false;
      let isHrEditMode = false;
      let hrEditPassword = "";
      let positionContextCache = {};
      let positionContextLoading = {};
      let positionContextError = {};

      function getSelectedPosition() {
        return window.INTERVIEW_DATA.positions.find((position) => position.id === selectedPositionId) || window.INTERVIEW_DATA.positions[0];
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function nl2br(value) {
        return escapeHtml(value).replace(/\n/g, "<br>");
      }

      function formatDate(date = new Date()) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        const hh = String(date.getHours()).padStart(2, "0");
        const mi = String(date.getMinutes()).padStart(2, "0");
        return `${yyyy}.${mm}.${dd} ${hh}:${mi}`;
      }

      function normalizeList(value) {
        if (Array.isArray(value)) return value.filter(Boolean).map((item) => String(item).trim()).filter(Boolean);
        if (!value) return [];
        return String(value).split(/\n|;/).map((item) => item.trim()).filter(Boolean);
      }

      function splitCommaOrLine(value) {
        if (Array.isArray(value)) return value.filter(Boolean).map((item) => String(item).trim()).filter(Boolean);
        if (!value) return [];
        return String(value).split(/\n|,|;/).map((item) => item.trim()).filter(Boolean);
      }

      function getDefaultContext(position = getSelectedPosition()) {
        return {
          keyTasks: "",
          requiredQualifications: "",
          preferredQualifications: "",
          coreCompetencies: (position?.competencies || []).map((item) => item.name).join(", "),
          updatedAt: "",
        };
      }

      function getCachedPositionContexts() {
        try {
          return JSON.parse(localStorage.getItem(POSITION_CONTEXT_CACHE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setCachedPositionContexts(data) {
        localStorage.setItem(POSITION_CONTEXT_CACHE_KEY, JSON.stringify(data));
      }

      function hydratePositionContextCache() {
        positionContextCache = getCachedPositionContexts();
      }

      function getStoredPositionContext(positionId = selectedPositionId) {
        return positionContextCache[positionId] || null;
      }

      async function loadPositionContext(positionId = selectedPositionId, options = {}) {
        const force = Boolean(options.force);
        if (!positionId) return null;
        if (!force && positionContextCache[positionId]) return positionContextCache[positionId];
        if (positionContextLoading[positionId]) return null;

        positionContextLoading[positionId] = true;
        positionContextError[positionId] = "";

        try {
          const response = await fetch(`/api/position-criteria?positionId=${encodeURIComponent(positionId)}`);
          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            throw new Error(data.error || "포지션 분석 기준을 불러오지 못했습니다.");
          }

          if (data.criteria) {
            positionContextCache[positionId] = data.criteria;
          } else {
            delete positionContextCache[positionId];
          }

          setCachedPositionContexts(positionContextCache);
          return data.criteria || null;
        } catch (error) {
          positionContextError[positionId] = error.message || "포지션 분석 기준을 불러오지 못했습니다.";
          return null;
        } finally {
          positionContextLoading[positionId] = false;
          contextDraft = null;
          render();
        }
      }

      function getContextDraft() {
        if (!contextDraft || contextDraft.positionId !== selectedPositionId) {
          const stored = getStoredPositionContext(selectedPositionId) || {};
          contextDraft = {
            positionId: selectedPositionId,
            ...getDefaultContext(getSelectedPosition()),
            ...stored,
          };

          if (!contextDraft.keyTasks && stored.jd) {
            contextDraft.keyTasks = stored.jd;
          }
        }
        return contextDraft;
      }

      function hasRequiredPositionContext(positionId = selectedPositionId) {
        const context = getStoredPositionContext(positionId);
        const keyTasks = context?.keyTasks || context?.jd || "";
        return Boolean(context && keyTasks.trim().length >= 10);
      }

      function updateContextField(field, value) {
        const draft = getContextDraft();
        draft[field] = value;
      }

      async function savePositionContext() {
        const draft = getContextDraft();
        if (!draft.keyTasks.trim()) {
          alert("주요업무를 입력해주세요.");
          return;
        }

        if (!hrEditPassword) {
          const password = prompt("HR 수정 비밀번호를 입력해주세요.");
          if (!password) return;
          hrEditPassword = password;
        }

        try {
          const selected = getSelectedPosition();
          const response = await fetch("/api/position-criteria", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-hr-password": hrEditPassword,
            },
            body: JSON.stringify({
              positionId: selectedPositionId,
              positionName: selected?.name || selectedPositionId,
              keyTasks: draft.keyTasks.trim(),
              requiredQualifications: draft.requiredQualifications.trim(),
              preferredQualifications: draft.preferredQualifications.trim(),
              coreCompetencies: draft.coreCompetencies.trim(),
            }),
          });

          const data = await response.json().catch(() => ({}));
          if (!response.ok) {
            if (response.status === 401) hrEditPassword = "";
            throw new Error(data.error || "포지션 분석 기준 저장에 실패했습니다.");
          }

          positionContextCache[selectedPositionId] = data.criteria;
          setCachedPositionContexts(positionContextCache);
          contextDraft = { positionId: selectedPositionId, ...data.criteria };
          isHrEditMode = false;
          alert("포지션 분석 기준이 저장되었습니다. 모든 면접관에게 동일하게 표시됩니다.");
          render();
        } catch (error) {
          alert(error.message || "포지션 분석 기준 저장에 실패했습니다.");
        }
      }

      function resetPositionContextDraft() {
        const ok = confirm("현재 입력 중인 포지션 분석 기준을 저장된 내용으로 되돌릴까요?");
        if (!ok) return;
        contextDraft = null;
        render();
      }

      function getGuideContext(position = getSelectedPosition()) {
        const competencies = position?.competencies || [];
        const standardQuestions = competencies.flatMap((section) =>
          (section.questions || []).map((q) => ({
            competency: section.name,
            question: q.main,
            type: q.type,
          }))
        );

        return {
          guideTitle: position?.guideTitle || "",
          guideSummary: position?.summary || "",
          guideCompetencies: competencies.map((item) => ({
            id: item.id,
            name: item.name,
            order: item.order,
            points: (item.questions || []).flatMap((q) => q.points || []).slice(0, 8),
          })),
          standardQuestions,
        };
      }

      function getAnalysisPositionContext() {
        const position = getSelectedPosition();
        const stored = getStoredPositionContext(selectedPositionId) || getDefaultContext(position);
        const guide = getGuideContext(position);
        return {
          positionId: position?.id || "",
          positionName: position?.name || "",
          keyTasks: normalizeList(stored.keyTasks || stored.jd),
          requiredQualifications: normalizeList(stored.requiredQualifications),
          preferredQualifications: normalizeList(stored.preferredQualifications),
          coreCompetencies: splitCommaOrLine(stored.coreCompetencies),
          guide,
        };
      }

      function getAllCandidates() {
        try {
          return JSON.parse(localStorage.getItem(CANDIDATE_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllCandidates(data) {
        localStorage.setItem(CANDIDATE_STORAGE_KEY, JSON.stringify(data));
      }

      function getAllCustomQuestions() {
        try {
          return JSON.parse(localStorage.getItem(CUSTOM_QUESTION_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllCustomQuestions(data) {
        localStorage.setItem(CUSTOM_QUESTION_STORAGE_KEY, JSON.stringify(data));
      }


      function getAnalysisHistory() {
        try {
          const history = JSON.parse(localStorage.getItem(ANALYSIS_HISTORY_STORAGE_KEY)) || [];
          return Array.isArray(history) ? history : [];
        } catch (e) {
          return [];
        }
      }

      function setAnalysisHistory(history) {
        localStorage.setItem(ANALYSIS_HISTORY_STORAGE_KEY, JSON.stringify(history));
      }

      function getAnalysisSnapshotTitle(item) {
        const name = item?.candidateName?.trim() || "후보자명 미입력";
        const position = item?.positionName || "포지션";
        return `${position} · ${name}`;
      }

      function isAnalysisAddedToGuide(item) {
        if (!item) return false;
        if (item.addedToGuide) return true;

        const candidatesByPosition = getAllCandidates();
        const candidates = candidatesByPosition[item.positionId] || [];
        const candidateNameKey = (item.candidateName || "").trim();

        return candidates.some((candidate) => {
          if (item.candidateId && candidate.id === item.candidateId) return true;
          return candidateNameKey && (candidate.name || "").trim() === candidateNameKey;
        });
      }

      function saveAnalysisHistorySnapshot() {
        if (!analysisResult) return;
        const selected = getSelectedPosition();
        const snapshot = {
          id: `analysis_${Date.now()}`,
          savedAt: formatDate(),
          positionId: selectedPositionId,
          positionName: selected?.name || "",
          candidateName: candidateName.trim(),
          analysisResult: JSON.parse(JSON.stringify(analysisResult)),
          selectedQuestionIds: JSON.parse(JSON.stringify(selectedQuestionIds || {})),
          addedToGuide: false,
          addedAt: "",
          candidateId: "",
        };

        const history = getAnalysisHistory();
        history.unshift(snapshot);
        setAnalysisHistory(history.slice(0, 50));
        currentAnalysisHistoryId = snapshot.id;
      }

      function markCurrentAnalysisAddedToGuide(candidateId) {
        if (!currentAnalysisHistoryId) return;
        const history = getAnalysisHistory();
        const updated = history.map((item) => {
          if (item.id !== currentAnalysisHistoryId) return item;
          return {
            ...item,
            addedToGuide: true,
            addedAt: formatDate(),
            candidateId,
          };
        });
        setAnalysisHistory(updated);
      }

      function loadAnalysisHistory(historyId) {
        const history = getAnalysisHistory();
        const item = history.find((entry) => entry.id === historyId);
        if (!item) {
          alert("저장된 분석 결과를 찾을 수 없습니다.");
          return;
        }

        selectedPositionId = item.positionId;
        candidateName = item.candidateName || "";
        analysisResult = item.analysisResult ? normalizeAnalysis(item.analysisResult) : null;
        selectedQuestionIds = item.selectedQuestionIds || {};
        currentAnalysisHistoryId = item.id;
        resumeText = "";
        errorMessage = "";
        contextDraft = null;
        render();
        loadPositionContext(selectedPositionId);
        setTimeout(() => window.scrollTo({ top: 0, behavior: "smooth" }), 50);
      }

      function deleteAnalysisHistory(historyId, event) {
        if (event) event.stopPropagation();
        const ok = confirm("이 분석 결과 저장 기록을 삭제할까요?\n이력서 원본은 저장되어 있지 않으며, 저장된 AI 브리프와 질문 기록만 삭제됩니다.");
        if (!ok) return;
        const history = getAnalysisHistory().filter((entry) => entry.id !== historyId);
        setAnalysisHistory(history);
        render();
      }

      function getSafeFileName(value) {
        return String(value || "")
          .replace(/[\\/:*?"<>|]/g, "_")
          .replace(/\s+/g, "_")
          .slice(0, 80);
      }

      function buildAnalysisPdfHtml() {
        const selected = getSelectedPosition();
        const name = candidateName.trim() || "후보자명 미입력";
        const result = analysisResult || {};
        const renderList = (items) => (items || []).length
          ? `<ul>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
          : `<p class="empty">내용 없음</p>`;
        const renderJdFit = (items) => (items || []).length
          ? items.map((item) => `
            <div class="box small-break">
              <div class="row">
                <strong>${escapeHtml(item.competency)}</strong>
                <span>${Number(item.score || 0)} / 100</span>
              </div>
              <p>${nl2br(item.evidence || "근거 없음")}</p>
            </div>
          `).join("")
          : `<p class="empty">JD 역량 적합도 없음</p>`;
        const renderQuestions = (items) => (items || []).length
          ? items.map((question, index) => `
            <div class="box small-break">
              <div class="question-meta">
                <span>${escapeHtml(question.type || "AI 이력서 기반")}</span>
                ${selectedQuestionIds[question.id] ? `<b>선택 질문</b>` : ``}
              </div>
              <h4>Q${index + 1}. ${escapeHtml(question.main)}</h4>
              ${question.follow?.length ? `<p><strong>꼬리 질문</strong><br>${question.follow.map(escapeHtml).join("<br>")}</p>` : ""}
              <p><strong>질문 의도</strong><br>${escapeHtml(question.intent || "-")}</p>
              <p><strong>이력서 근거</strong><br>${escapeHtml(question.sourceEvidence || "-")}</p>
            </div>
          `).join("")
          : `<p class="empty">후보자 맞춤 질문 없음</p>`;

        return `
          <div class="pdf-doc">
            <style>
              .pdf-doc { width: 720px; padding: 32px; background: #fff; color: #1e293b; font-family: Pretendard, Arial, sans-serif; }
              .pdf-doc h1 { margin: 8px 0 6px; font-size: 26px; }
              .pdf-doc h2 { margin: 28px 0 12px; font-size: 18px; color: #0f172a; }
              .pdf-doc h3 { margin: 0; font-size: 15px; }
              .pdf-doc h4 { margin: 10px 0; font-size: 14px; line-height: 1.6; }
              .pdf-doc p, .pdf-doc li { font-size: 12px; line-height: 1.8; }
              .pdf-doc ul { margin: 0; padding-left: 18px; }
              .eyebrow { font-size: 11px; letter-spacing: .14em; color: #64748b; }
              .meta { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 18px; }
              .meta div, .summary, .box { border: 1px solid #e2e8f0; border-radius: 16px; padding: 14px; background: #f8fafc; }
              .summary { background: #eff6ff; border-color: #bfdbfe; }
              .score { display: inline-block; margin-bottom: 8px; border-radius: 999px; background: #dbeafe; color: #1d4ed8; padding: 5px 10px; font-weight: 700; font-size: 12px; }
              .row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
              .row span { color: #2563eb; font-weight: 700; font-size: 12px; }
              .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
              .question-meta { display: flex; gap: 8px; flex-wrap: wrap; }
              .question-meta span, .question-meta b { border-radius: 999px; padding: 4px 9px; font-size: 11px; background: #fff7ed; color: #c2410c; }
              .question-meta b { background: #dbeafe; color: #1d4ed8; }
              .small-break { page-break-inside: avoid; break-inside: avoid; margin-bottom: 10px; }
              .empty { color: #94a3b8; }
            </style>
            <div class="eyebrow">DOZN AI RESUME ANALYSIS</div>
            <h1>${escapeHtml(selected?.name || "포지션")} AI 이력서 분석 결과</h1>
            <div class="meta">
              <div><h3>후보자명</h3><p>${escapeHtml(name)}</p></div>
              <div><h3>분석일</h3><p>${escapeHtml(formatDate())}</p></div>
              <div><h3>포지션</h3><p>${escapeHtml(selected?.name || "-")}</p></div>
            </div>

            <h2>지원자 요약</h2>
            <div class="summary small-break">
              <div class="score">AI 참고 점수 ${result.overallFitScore || "-"} / 100</div>
              <p>${nl2br(result.summary || "내용 없음")}</p>
            </div>

            <h2>JD 역량 적합도</h2>
            ${renderJdFit(result.jdFit)}

            <h2>검증 포인트</h2>
            <div class="box small-break">${renderList(result.verificationPoints)}</div>

            <h2>후보자 맞춤 질문</h2>
            ${renderQuestions(result.questions)}
          </div>
        `;
      }

      function downloadAnalysisPdf() {
        if (!analysisResult) {
          alert("먼저 AI 분석을 실행하거나 저장된 분석 결과를 불러와 주세요.");
          return;
        }
        if (!window.html2pdf) {
          alert("PDF 저장 라이브러리를 불러오지 못했습니다. 잠시 후 다시 시도해 주세요.");
          return;
        }

        const selected = getSelectedPosition();
        const wrapper = document.createElement("div");
        wrapper.innerHTML = buildAnalysisPdfHtml();
        document.body.appendChild(wrapper);

        const fileName = `${getSafeFileName(selected?.name || "포지션")}_${getSafeFileName(candidateName || "후보자")}_AI이력서분석.pdf`;
        const opt = {
          margin: [8, 8, 8, 8],
          filename: fileName,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
          jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
          pagebreak: { mode: ["css", "legacy"] },
        };

        html2pdf().set(opt).from(wrapper.firstElementChild).save().finally(() => {
          document.body.removeChild(wrapper);
        });
      }

      function getQuestionRubric() {
        return {
          purpose: "후보자 이력서에 기재된 특정 경험의 실제 수행 범위, 본인 기여도, 성과 근거를 확인합니다.",
          good: "이력서에 기재된 경험을 본인 역할, 판단 기준, 실행 과정, 결과 근거와 함께 구체적으로 설명합니다.",
          average: "경험 자체는 설명하나 본인 기여도나 성과 근거가 일부 불명확합니다.",
          weak: "팀 성과를 일반적으로 설명하거나 실제 수행 범위, 수치 기준, 의사결정 내용을 명확히 답변하지 못합니다.",
        };
      }

      function cleanupGeneratedText(value) {
        let text = String(value || "");
        const replacements = [
          ["TypeScript,Next.js", "TypeScript, Next.js"],
          ["Java/Spring,ORM", "Java/Spring, ORM"],
          ["API및TCP통신", "API 및 TCP 통신"],
          ["API/TCP통신", "API/TCP 통신"],
          ["기반서비스개발경험", "기반 서비스 개발 경험"],
          ["서비스개발경험", "서비스 개발 경험"],
          ["외부시스템연동", "외부 시스템 연동"],
          ["운영관리용", "운영 관리용"],

          ["DB모델", "DB 모델"],
          ["모델재설계", "모델 재설계"],

          ["업무계획", "업무 계획"],
          ["업무일정관리", "업무 일정 관리"],

          ["직접연관성", "직접 연관성"],
          ["문제해결력", "문제 해결력"],
        ];
        replacements.forEach(([from, to]) => {
          text = text.replaceAll(from, to);
        });
        return text
          .replace(/\[[0-9]+p\]/gi, "")
          .replace(/<PARSED TEXT[^>]*>/gi, "")
          .replace(/[  ]+/g, "")
          .replace(/[“"]([^“”"]{80,})[”"]/g, (match, inner) => `“${inner.replace(/\s+/g, " ").trim().slice(0, 45)}...”`)
          .replace(/(\d+)\s*\/\s*100\s*종합\s*적합도\s*[\.:：-]?/gi, "")
          .replace(/\b(Java\s*\/\s*Spring|TypeScript|Next\.js|React|Node\.js|Python)\s*기반\s*[가-힣A-Za-z0-9|·\s]{0,35}\|?\s*경력\s*\d+\s*년\s*\d*\s*개월?/gi, "")
          .replace(/이력서에서는\s*/g, "")
          .replace(/내용이\s*우선적으로\s*확인되며,?/g, "")
          .replace(/필수자격\/필요경험\s*중\s*/g, "")
          .replace(/요건과\s*연결되는\s*정황/g, "관련 경험으로 볼 수 있는 단서")
          .replace(/경험은\s*실질적\s*변화를\s*만든\s*사례로\s*볼\s*여지가\s*있습니다/g, "실질적인 개선 경험으로 해석할 수 있습니다")
          .replace(/또한(?=[A-Za-z가-힣])/g, "")
          .replace(/,(?=\S)/g, ", ")
          .replace(/\.(?=\S)/g, ". ")
          .replace(/\)(?=\S)/g, ") ")
          .replace(/([가-힣])\|([가-힣])/g, "$1 / $2")
          .replace(/([가-힣])([A-Za-z])/g, "$1 $2")
          .replace(/([A-Za-z])([가-힣])/g, "$1 $2")
          .replace(/\s{2,}/g, " ")
          .trim();
      }

      function sanitizeSummary(value) {
        const cleaned = cleanupGeneratedText(value);
        return cleaned.replace(/^[\s\.:：-]+/, "").trim();
      }

      function shortenLongQuotedText(value) {
        return cleanupGeneratedText(value).replace(/[“"]([^“”"]{80,})[”"]/g, (match, inner) => {
          const compact = inner.replace(/\s+/g, " ").trim();
          return `“${compact.slice(0, 45)}...”`;
        });
      }

      function cleanResumeTextForPrompt(value) {
        return String(value || "")
          .replace(/\[[0-9]+p\]/gi, "")
          .replace(/[  ]+/g, "")
          .replace(/기\s+반/g, "기반")
          .replace(/백\s+엔\s+드/g, "백엔드")
          .replace(/프\s+론\s+트\s+엔\s+드/g, "프론트엔드")
          .replace(/개\s+발\s+자/g, "개발자")
          .replace(/개\s+발/g, "개발")
          .replace(/경\s+력/g, "경력")
          .replace(/업\s+무/g, "업무")
          .replace(/시\s+스\s+템/g, "시스템")
          .replace(/서\s+비\s+스/g, "서비스")
          .replace(/외\s+부/g, "외부")
          .replace(/연\s+동/g, "연동")
          .replace(/모\s+델/g, "모델")
          .replace(/재\s+설\s+계/g, "재설계")
          .replace(/운\s+영/g, "운영")
          .replace(/관\s+리/g, "관리")
          .replace(/보\s+유/g, "보유")
          .replace(/경\s+험/g, "경험")
          .replace(/([가-힣])([A-Za-z])/g, "$1 $2")
          .replace(/([A-Za-z])([가-힣])/g, "$1 $2")
          .replace(/,(?=\S)/g, ", ")
          .replace(/\.(?=\S)/g, ". ")
          .replace(/\s{2,}/g, " ")
          .trim();
      }

      function normalizeQuestion(question, index) {
        const rubric = getQuestionRubric();
        return {
          id: question.id || `ai_question_${Date.now()}_${index}`,
          type: question.type || "AI 이력서 기반",
          main: shortenLongQuotedText(question.main || question.question || ""),
          follow: normalizeList(question.follow || question.followUp),
          points: normalizeList(question.points || question.checkPoints || question.verificationFocus),
          intent: shortenLongQuotedText(question.intent || ""),
          sourceEvidence: shortenLongQuotedText(question.sourceEvidence || question.evidence || ""),
          relatedCompetency: cleanupGeneratedText(question.relatedCompetency || ""),
          rubric: {
            purpose: question.intent || rubric.purpose,
            good: rubric.good,
            average: rubric.average,
            weak: rubric.weak,
          },
        };
      }

      function normalizeJdFit(item, index) {
        return {
          id: item.id || `jd_fit_${Date.now()}_${index}`,
          competency: cleanupGeneratedText(item.competency || item.name || item.title || `JD 역량 ${index + 1}`),
          score: Number(item.score || item.fitScore || 0),
          evidence: shortenLongQuotedText(item.evidence || item.reason || item.rationale || ""),
        };
      }

      function normalizeAnalysis(raw) {
        const questions = (raw.customQuestions || raw.recommendedQuestions || raw.questions || []).map(normalizeQuestion);
        const jdFit = (raw.jdFit || raw.jdCompetencyFit || raw.competencyFit || []).map(normalizeJdFit);
        return {
          overallFitScore: Number(raw.overallFitScore || raw.fitScore || raw.score || 0),
          summary: sanitizeSummary(raw.summary || raw.candidateSummary || ""),
          jdFit,
          strengths: normalizeList(raw.strengths),
          concerns: normalizeList(raw.concerns || raw.risks),
          verificationPoints: normalizeList(raw.verificationPoints || raw.checkPoints),
          questions,
        };
      }

      async function handlePdfUpload(input) {
        const file = input.files?.[0];
        if (!file) return;

        if (!file.name.toLowerCase().endsWith(".pdf")) {
          alert("PDF 파일만 업로드할 수 있습니다.");
          input.value = "";
          return;
        }

        const maxFileSize = 7 * 1024 * 1024;
        if (file.size > maxFileSize) {
          alert("PDF 파일 용량이 너무 큽니다. 7MB 이하의 이력서 파일을 업로드해 주세요.");
          input.value = "";
          return;
        }

        isPdfParsing = true;
        errorMessage = "";
        resumePdfBase64 = "";
        resumePdfName = file.name;
        resumePdfMimeType = file.type || "application/pdf";
        render();

        try {
          const base64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
              const result = String(reader.result || "");
              resolve(result.includes(",") ? result.split(",")[1] : result);
            };
            reader.onerror = () => reject(reader.error || new Error("파일을 읽지 못했습니다."));
            reader.readAsDataURL(file);
          });

          resumePdfBase64 = base64;
          resumeText = `PDF 원본 파일이 업로드되었습니다. (${file.name})
Gemini가 PDF 원본을 직접 읽어 분석합니다.`;
        } catch (error) {
          console.error(error);
          errorMessage = "PDF 파일을 읽는 중 오류가 발생했습니다. 다시 업로드해 주세요.";
        } finally {
          isPdfParsing = false;
          render();
        }
      }

절대 금지:

근거 사용 방식:

- 근거를 언급할 때도 원문을 그대로 복사하지 말고, "평가제도 설계와 SaaS 도입", "ATS 전환을 통한 채용 리드타임 개선", "포괄임금제 로직 개선"처럼 요약해 표현하세요.
- sourceEvidence 필드는 원문 전체가 아니라 근거가 되는 경험명/성과명만 짧게 적으세요.

점수 산정 기준:
- overallFitScore는 0~100 정수로 산정하세요.
- JD 역량별 score도 0~100 정수로 산정하세요.
- 90점 이상: JD 요구와 이력서 근거가 매우 직접적이고, 성과/역할/맥락이 구체적임
- 80~89점: JD와 직접 연결되는 경험이 충분하나 일부 판단 근거 또는 깊이 확인 필요
- 70~79점: 관련 경험은 있으나 전략적 판단, 의사결정 맥락, 성과 근거가 일부 불명확함
- 60~69점: 간접 경험 위주이거나 JD 핵심업무와의 연결성이 제한적임
- 60점 미만: 이력서상 근거가 부족함
- 점수를 후하게 주지 마세요. 경험이 있어도 본인 역할, 의사결정 기준, 성과 산정 방식이 불명확하면 70점대로 조정하세요.

출력 품질 기준:
1. overallFitScore

- OCR 텍스트에 띄어쓰기가 무너져 있어도, 반드시 자연스러운 한국어 띄어쓰기로 다시 작성하세요.

      function getAnalysisSchema() {
        return {
          type: "object",
          additionalProperties: false,
          properties: {
            overallFitScore: { type: "number" },
            summary: { type: "string" },
            jdFit: {
              type: "array",
              minItems: 3,
              maxItems: 5,
              items: {
                type: "object",
                additionalProperties: false,
                properties: {
                  competency: { type: "string" },
                  score: { type: "number" },
                  evidence: { type: "string" },
                },
                required: ["competency", "score", "evidence"],
              },
            },
            verificationPoints: { type: "array", items: { type: "string" } },
            customQuestions: {
              type: "array",
              minItems: 4,
              maxItems: 8,
              items: {
                type: "object",
                additionalProperties: false,
                properties: {
                  type: { type: "string" },
                  main: { type: "string" },
                  follow: { type: "array", items: { type: "string" } },
                  intent: { type: "string" },
                  relatedCompetency: { type: "string" },
                  sourceEvidence: { type: "string" },
                  points: { type: "array", items: { type: "string" } },
                },
                required: ["type", "main", "follow", "intent", "relatedCompetency", "sourceEvidence", "points"],
              },
            },
          },
          required: ["overallFitScore", "summary", "jdFit", "verificationPoints", "customQuestions"],
        };
      }
      function extractOutputText(data) {
        if (data.output_text) return data.output_text;
        const chunks = [];
        (data.output || []).forEach((item) => {
          (item.content || []).forEach((content) => {
            if (content.text) chunks.push(content.text);
            if (content.type === "output_text" && content.text) chunks.push(content.text);
          });
        });
        return chunks.join("\n");
      }

      function getExistingQuestionsForApi() {
        const positionContext = getAnalysisPositionContext();
        return positionContext.guide.standardQuestions.slice(0, 120).map((item) => ({
          competency: item.competency,
          question: item.question,
        }));
      }

      async function analyzeResume() {
        if (!validateAnalysisInputs()) return;

        isAnalyzing = true;
        errorMessage = "";
        selectedQuestionIds = {};
        render();

        try {
          const response = await fetch("/api/analyze-resume", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              positionContext: getAnalysisPositionContext(),
              resumeText: resumePdfBase64 ? "" : resumeText,
              resumePdfBase64,
              resumePdfMimeType,
              resumePdfName,
              existingQuestions: getExistingQuestionsForApi(),
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || "AI 분석 요청에 실패했습니다.");
          }

          if (!data.analysis) {
            throw new Error("AI 응답에서 분석 결과를 찾지 못했습니다.");
          }

          analysisResult = normalizeAnalysis(data.analysis);
          analysisResult.questions.forEach((question) => {
            selectedQuestionIds[question.id] = true;
          });
          saveAnalysisHistorySnapshot();
        } catch (error) {
          console.error(error);
          errorMessage = error.message || "AI 분석 중 오류가 발생했습니다.";
        } finally {
          isAnalyzing = false;
          render();
        }
      }

      function getKeywordCandidates(text) {
        const clean = String(text || "").replace(/[\[\]{}()<>]/g, " ");
        const words = clean.match(/[A-Za-z0-9가-힣+#.]{2,}/g) || [];
        const stop = new Set(["업무", "경험", "관련", "지원", "필수", "우대", "포지션", "담당", "자격", "역량", "능력", "이상", "이하", "대한", "통해", "기반", "진행", "관리", "운영", "개선", "확인", "필요", "가능", "활용", "수행", "주요", "담당자", "개발자", "서비스", "프로젝트"]);
        const counts = {};
        words.forEach((word) => {
          const w = word.trim();
          if (w.length < 2 || stop.has(w)) return;
          counts[w] = (counts[w] || 0) + 1;
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 16).map(([word]) => word);
      }

      function splitResumeSentences() {
        return resumeText
          .replace(/\r/g, "\n")
          .split(/\n+|(?<=[.!?。])\s+|(?<=다\.)\s+|(?<=요\.)\s+|(?<=함\.)\s+|(?<=됨\.)\s+/)
          .map((item) => item.replace(/\s+/g, " ").trim())
          .filter((item) => item.length >= 18)
          .slice(0, 120);
      }

      function shortenEvidence(text, max = 150) {
        const clean = String(text || "").replace(/\s+/g, " ").trim();
        return clean.length > max ? `${clean.slice(0, max)}...` : clean;
      }

      function getScoredEvidence(keywords = []) {
        const sentences = splitResumeSentences();
        const scored = sentences.map((sentence, index) => {
          const score = keywords.reduce((sum, keyword) => sum + (sentence.includes(keyword) ? 2 : 0), 0) + Math.max(0, 4 - index * 0.03);
          return { sentence, score };
        });

        const picked = scored
          .sort((a, b) => b.score - a.score)
          .map((item) => item.sentence)
          .filter((sentence, index, arr) => arr.findIndex((other) => other.slice(0, 45) === sentence.slice(0, 45)) === index)
          .slice(0, 8)
          .map((item) => shortenEvidence(item));

        if (picked.length < 4) {
          sentences.slice(0, 8).forEach((sentence) => {
            if (picked.length < 4 && !picked.includes(sentence)) picked.push(shortenEvidence(sentence));
          });
        }
        return picked;
      }

      function firstItem(list, fallback) {
        return Array.isArray(list) && list.length ? list[0] : fallback;
      }

      function getResumeSignals() {
        const text = cleanResumeTextForPrompt(resumeText);
        const signals = [];
        const add = (condition, label, meaning) => {
          if (condition && !signals.some((item) => item.label === label)) signals.push({ label, meaning });
        };

        add(/Java|Spring|Spring Boot/i.test(text), "Java/Spring 백엔드 개발", "백엔드 업무 시스템 개발 경험");
        add(/레거시|전환|마이그레이션/i.test(text), "레거시 전환", "기존 시스템 개선과 구조 변경 경험");
        add(/외부|연동|API|VAN|인증|LLM/i.test(text), "외부 시스템 연동", "외부 서비스와의 연계 및 운영 이슈 대응 경험");
        add(/DB|모델|Dynamo|Maria|Redis/i.test(text), "DB 모델 설계와 Redis 활용", "데이터 구조와 세션/성능 관련 경험");
        add(/어드민|관리자|운영관리/i.test(text), "운영관리용 어드민 개발", "현업 운영 흐름을 지원하는 내부 도구 개발 경험");
        add(/이슈|장애|개선|공통 로직|리팩토링/i.test(text), "운영 이슈 분석과 공통 로직 개선", "반복 문제를 구조적으로 개선한 경험");
        add(/TypeScript|Next\.js|React/i.test(text), "프론트엔드 서비스 개발 단서", "프론트엔드 기술 스택과의 접점");
        add(/평가제도|레몬베이스|리더십|ATS|온보딩|포괄임금/i.test(text), "HR 제도 운영과 개선", "제도 설계 이후 운영·안착까지 이어간 경험");

        if (!signals.length) signals.push({ label: "이력서상 주요 프로젝트 경험", meaning: "포지션과 연결 가능한 경험 소재" });
        return signals.slice(0, 6);
      }

      function summarizeRequirementForDemo(requiredText) {
        const text = String(requiredText || "");
        if (/TypeScript|Next\.js/i.test(text)) return "프론트엔드 서비스 개발 경험";
        if (/Java|Spring/i.test(text)) return "Java/Spring 기반 백엔드 개발 역량";
        if (/AWS|클라우드|인프라/i.test(text)) return "클라우드 환경에서의 개발·운영 경험";
        if (/리더|파트너|조직|HRBP/i.test(text)) return "리더와 함께 조직 이슈를 진단하고 실행안을 도출한 경험";
        if (/성과|평가|보상/i.test(text)) return "성과관리·평가 제도를 현업 맥락에 맞게 운영한 경험";
        return "필수 경험의 실제 수행 깊이";
      }

      function summarizeTaskForDemo(taskText, positionName) {
        const text = String(taskText || "");
        if (/어드민|관리자|운영관리/i.test(text)) return "운영관리용 어드민 웹 개발";
        if (/환전|선불|모바일상품권|교통카드/i.test(text)) return "금융 서비스 운영 흐름을 지원하는 개발 업무";
        if (/리더|1:1|조직|HRBP/i.test(text)) return "리더와의 파트너십을 통한 조직 이슈 진단";
        if (/온보딩|피드백|평가|보상/i.test(text)) return "HR 제도를 현업에 안착시키는 업무";
        return `${positionName}의 주요업무`;
      }

              points: ["이해관계자 조율", "협업 방식", "판단 기준"],
            },
          ],

        selectedQuestionIds = {};

      function saveToGuide() {
        if (!analysisResult) {
          alert("먼저 분석 결과를 생성해주세요.");
          return;
        }
        const name = candidateName.trim();
        if (!name) {
          alert("후보자명을 입력해주세요.");
          return;
        }

        const selectedQuestions = analysisResult.questions.filter((question) => selectedQuestionIds[question.id]);
        if (!selectedQuestions.length) {
          alert("구조화면접 가이드에 추가할 질문을 1개 이상 선택해주세요.");
          return;
        }

        const allCandidates = getAllCandidates();
        const candidates = allCandidates[selectedPositionId] || [];
        const existingCandidate = candidates.find((candidate) => (candidate.name || "").trim() === name);
        let candidateId = existingCandidate?.id || `candidate_${Date.now()}`;

        if (existingCandidate) {
          const ok = confirm("이미 동일한 후보자명이 등록되어 있습니다. 기존 후보자 세션의 AI 브리프와 추천 질문을 업데이트할까요?");
          if (!ok) return;
        }

        const newCandidate = {
          id: candidateId,
          name,
          createdAt: existingCandidate?.createdAt || formatDate(),
          updatedAt: formatDate(),
          aiBrief: {
            overallFitScore: analysisResult.overallFitScore,
            summary: analysisResult.summary,
            jdFit: analysisResult.jdFit || [],
            strengths: analysisResult.strengths,
            concerns: analysisResult.concerns,
            verificationPoints: analysisResult.verificationPoints,
          },
        };

        const nextCandidates = existingCandidate
          ? candidates.map((candidate) => candidate.id === candidateId ? newCandidate : candidate)
          : [newCandidate, ...candidates];
        allCandidates[selectedPositionId] = nextCandidates;
        setAllCandidates(allCandidates);

        const sessionKey = `${selectedPositionId}__${candidateId}`;
        const allCustomQuestions = getAllCustomQuestions();
        allCustomQuestions[sessionKey] = selectedQuestions.map((question, index) => ({
          id: `ai_custom_${Date.now()}_${index}`,
          type: question.type || "AI 이력서 기반",
          main: question.main,
          follow: question.follow || [],
          points: question.points?.length ? question.points : [question.relatedCompetency || "이력서 기반 검증"],
          intent: shortenLongQuotedText(question.intent || ""),
          sourceEvidence: question.sourceEvidence || "",
          relatedCompetency: cleanupGeneratedText(question.relatedCompetency || ""),
          rubric: question.rubric || getQuestionRubric(),
        }));
        setAllCustomQuestions(allCustomQuestions);
        markCurrentAnalysisAddedToGuide(candidateId);

        window.location.href = `index.html?positionId=${encodeURIComponent(selectedPositionId)}&candidateId=${encodeURIComponent(candidateId)}`;
      }

                </p>
              </div>
              <a href="index.html" class="rounded-full border border-slate-200 bg-white/85 px-4 py-2 text-sm font-medium text-slate-700 shadow-sm backdrop-blur">
                ← 구조화면접 가이드로 돌아가기
              </a>
            </div>

            <div class="grid gap-6 xl:grid-cols-[420px_minmax(0,1fr)]">
              <aside class="space-y-4 xl:sticky xl:top-6 xl:h-fit">
                <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <h2 class="text-xl font-semibold text-slate-900">포지션 선택</h2>
                  <label class="mt-5 block text-sm font-semibold text-slate-700">
                    분석할 포지션
                    <select class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none" onchange="selectPosition(this.value)">
                      ${data.positions.map((position) => {
                        const saved = hasRequiredPositionContext(position.id);
                        return `<option value="${position.id}" ${position.id === selectedPositionId ? "selected" : ""}>${escapeHtml(position.name)}${saved ? " · 기준 등록됨" : ""}</option>`;
                      }).join("")}
                    </select>
                  </label>
                </section>

                ${renderPositionContextCard()}

                <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <h2 class="text-xl font-semibold text-slate-900">후보자 이력서 등록</h2>
                  <div class="mt-4 rounded-2xl border border-amber-100 bg-amber-50 px-4 py-3 text-xs leading-5 text-amber-800">
                    이력서 업로드 시 후보자 개인정보는 (메일주소, 연락처 등) 마스킹하여 업로드해주세요.
                  </div>

                  <label class="mt-5 block text-sm font-semibold text-slate-700">
                    후보자명 <span class="text-rose-500">*</span>
                    <input class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none placeholder:text-slate-400" placeholder="예: 홍길동" value="${escapeHtml(candidateName)}" oninput="candidateName = this.value" />
                  </label>

                  <label class="mt-4 block text-sm font-semibold text-slate-700">
                    이력서 PDF 업로드
                    <input type="file" accept="application/pdf,.pdf" class="mt-2 w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm" onchange="handlePdfUpload(this)" />
                  </label>

                  <label class="mt-4 block text-sm font-semibold text-slate-700">
                    이력서 텍스트 직접 붙여넣기 <span class="font-normal text-slate-400">(PDF 업로드가 어려운 경우)</span>
                    <textarea class="mt-2 h-48 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm leading-6 outline-none placeholder:text-slate-400" placeholder="기본 방식은 PDF 원본 업로드입니다. PDF 업로드가 어려운 경우에만 이력서 텍스트를 직접 붙여넣어 주세요." oninput="resumePdfBase64 = ''; resumePdfName = ''; resumeText = this.value">${escapeHtml(resumeText)}</textarea>
                  </label>
                </section>

                <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <h2 class="text-xl font-semibold text-slate-900">이력서 AI 분석</h2>
                  <p class="mt-2 text-xs leading-5 text-slate-500">
                    <span class="font-semibold text-slate-800">분석 횟수에 따라 토큰이 차감됩니다.</span> 무분별한 분석은 지양해주시고, 실제 면접 대상자의 이력서만 분석해주세요.
                  </p>

                  <div class="mt-5 grid gap-2">
                    <button onclick="analyzeResume()" class="rounded-full bg-[linear-gradient(90deg,#3b82f6,#69a4ff)] px-5 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(59,130,246,0.25)] transition hover:scale-[1.01] disabled:opacity-50" ${isAnalyzing || isPdfParsing || !contextReady ? "disabled" : ""}>
                      ${isAnalyzing ? "AI 분석 중..." : isPdfParsing ? "PDF 준비 중..." : contextReady ? "AI 분석하기" : "분석 기준 등록 후 분석 가능"}
                    </button>
                  </div>

                  <p class="mt-4 text-xs leading-5 text-slate-500">
                    🚨 오류 발생 시 HR팀 오지현 매니저에게 문의 바랍니다.
                  </p>
                </section>
              </aside>

              <main class="space-y-6">
                <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <div class="mb-5 flex flex-wrap items-start justify-between gap-3 border-b border-slate-100 pb-4">
                    <div>
                      <p class="text-sm font-medium text-blue-600">${escapeHtml(selected.name)}</p>
                      <h2 class="mt-1 text-2xl font-semibold text-slate-900">AI 분석 결과</h2>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                      ${analysisResult ? `<button onclick="downloadAnalysisPdf()" class="rounded-full border border-blue-200 bg-blue-50 px-4 py-2 text-xs font-semibold text-blue-700 shadow-sm transition hover:bg-blue-100">PDF 저장</button>` : ""}
                      <span class="rounded-full ${contextReady ? "bg-blue-50 text-blue-700" : "bg-amber-50 text-amber-700"} px-3 py-1 text-xs font-semibold">
                        ${contextReady ? "포지션 기준 분석 준비 완료" : "분석 기준 등록 필요"}
                      </span>
                    </div>
                  </div>
                  ${!contextReady ? `<div class="mb-5 rounded-2xl border border-amber-100 bg-amber-50 px-4 py-3 text-sm leading-6 text-amber-800">해당 포지션의 분석 기준이 아직 등록되지 않았습니다. HR팀에서 기준을 등록한 후 분석을 진행해주세요.</div>` : ""}
                  ${errorMessage ? `<div class="mb-5 rounded-2xl border border-rose-100 bg-rose-50 px-4 py-3 text-sm leading-6 text-rose-700">${escapeHtml(errorMessage)}</div>` : ""}
                  ${renderAnalysisCards()}
                </section>

                ${renderQuestionList()}

                <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <div>
                    <p class="text-sm font-medium text-slate-500">구조화면접 가이드 연결</p>
                    <h2 class="mt-1 text-xl font-semibold text-slate-900">선택한 질문을 후보자 세션에 추가</h2>
                    <p class="mt-2 text-sm leading-6 text-slate-500">후보자명, AI 브리프, 선택 질문이 저장되고 해당 후보자의 면접 페이지로 이동합니다.</p>

                    <div class="mt-5 flex flex-col gap-2 sm:flex-row">
                      <button onclick="downloadAnalysisPdf()" class="rounded-full border border-blue-200 bg-blue-50 px-5 py-3 text-sm font-semibold text-blue-700 shadow-sm transition hover:bg-blue-100 disabled:opacity-50" ${!analysisResult ? "disabled" : ""}>
                        PDF 저장
                      </button>
                      <button onclick="saveToGuide()" class="rounded-full bg-orange-500 px-6 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(249,115,22,0.25)] transition hover:bg-orange-600 disabled:opacity-50" ${!analysisResult ? "disabled" : ""}>
                        구조화면접 가이드에 추가
                      </button>
                    </div>
                  </div>
                </section>

                ${renderAnalysisHistoryPanel()}
              </main>
            </div>
          </div>
        `;
      }

      window.handlePdfUpload = handlePdfUpload;
      window.analyzeResume = analyzeResume;
      window.generateDemoAnalysis = generateDemoAnalysis;
      window.toggleQuestion = toggleQuestion;
      window.saveToGuide = saveToGuide;
      window.downloadAnalysisPdf = downloadAnalysisPdf;
      window.loadAnalysisHistory = loadAnalysisHistory;
      window.deleteAnalysisHistory = deleteAnalysisHistory;
      window.togglePositionContextOpen = togglePositionContextOpen;
      window.enableHrEditMode = enableHrEditMode;
      window.cancelHrEditMode = cancelHrEditMode;
      window.updateContextField = updateContextField;
      window.savePositionContext = savePositionContext;
      window.resetPositionContextDraft = resetPositionContextDraft;
      window.selectPosition = selectPosition;

      hydratePositionContextCache();
      render();
      loadPositionContext(selectedPositionId);
    </script>
  </body>
</html>
