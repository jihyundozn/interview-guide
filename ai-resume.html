<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 이력서 분석</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: #1e293b;
        background: linear-gradient(135deg, #edf5ff 0%, #dcecff 40%, #eef3ff 100%);
      }
      body { min-height: 100vh; }
      button, input, textarea, select { font: inherit; }
      .bg-orb-1, .bg-orb-2, .bg-orb-3 {
        position: fixed;
        pointer-events: none;
        filter: blur(40px);
        z-index: 0;
      }
      .bg-orb-1 {
        top: -80px; left: -80px; width: 340px; height: 340px; border-radius: 48px;
        background: radial-gradient(circle at top left, rgba(255, 232, 246, 0.65), rgba(255, 255, 255, 0) 70%);
      }
      .bg-orb-2 {
        top: 40px; right: 0; width: 420px; height: 420px; border-radius: 999px;
        background: radial-gradient(circle, rgba(176, 213, 255, 0.35), rgba(255, 255, 255, 0) 70%);
      }
      .bg-orb-3 {
        bottom: 0; left: 30%; width: 300px; height: 300px; border-radius: 999px;
        background: radial-gradient(circle, rgba(220, 236, 255, 0.55), rgba(255, 255, 255, 0) 72%);
      }
      .app-shell { position: relative; z-index: 1; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>
    <div id="app" class="app-shell"></div>

    <script src="interview-data.js"></script>
    <script>
      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      }

      const app = document.getElementById("app");
      const POSITION_CONTEXT_STORAGE_KEY = "dozn_ai_position_contexts_v1";
      const CANDIDATE_STORAGE_KEY = "dozn_interview_candidates_v1";
      const CUSTOM_QUESTION_STORAGE_KEY = "dozn_interview_custom_questions_v2";

      let selectedPositionId = new URLSearchParams(window.location.search).get("positionId") || window.INTERVIEW_DATA.positions[0]?.id || "";
      let candidateName = "";
      let resumeText = "";
      let apiKey = sessionStorage.getItem("dozn_openai_api_key") || "";
      let modelName = sessionStorage.getItem("dozn_openai_model") || "gpt-4.1-mini";
      let isAnalyzing = false;
      let isPdfParsing = false;
      let errorMessage = "";
      let selectedQuestionIds = {};
      let analysisResult = null;
      let contextDraft = null;

      function getSelectedPosition() {
        return window.INTERVIEW_DATA.positions.find((position) => position.id === selectedPositionId) || window.INTERVIEW_DATA.positions[0];
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function nl2br(value) {
        return escapeHtml(value).replace(/\n/g, "<br>");
      }

      function formatDate(date = new Date()) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        const hh = String(date.getHours()).padStart(2, "0");
        const mi = String(date.getMinutes()).padStart(2, "0");
        return `${yyyy}.${mm}.${dd} ${hh}:${mi}`;
      }

      function normalizeList(value) {
        if (Array.isArray(value)) return value.filter(Boolean).map((item) => String(item).trim()).filter(Boolean);
        if (!value) return [];
        return String(value).split(/\n|;/).map((item) => item.trim()).filter(Boolean);
      }

      function splitCommaOrLine(value) {
        if (Array.isArray(value)) return value.filter(Boolean).map((item) => String(item).trim()).filter(Boolean);
        if (!value) return [];
        return String(value).split(/\n|,|;/).map((item) => item.trim()).filter(Boolean);
      }

      function getDefaultContext(position = getSelectedPosition()) {
        return {
          keyTasks: "",
          requiredQualifications: "",
          preferredQualifications: "",
          coreCompetencies: (position?.competencies || []).map((item) => item.name).join(", "),
          updatedAt: "",
        };
      }

      function getAllPositionContexts() {
        try {
          return JSON.parse(localStorage.getItem(POSITION_CONTEXT_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllPositionContexts(data) {
        localStorage.setItem(POSITION_CONTEXT_STORAGE_KEY, JSON.stringify(data));
      }

      function getStoredPositionContext(positionId = selectedPositionId) {
        const all = getAllPositionContexts();
        return all[positionId] || null;
      }

      function getContextDraft() {
        if (!contextDraft || contextDraft.positionId !== selectedPositionId) {
          const stored = getStoredPositionContext(selectedPositionId) || {};
          contextDraft = {
            positionId: selectedPositionId,
            ...getDefaultContext(getSelectedPosition()),
            ...stored,
          };

          // 이전 버전에서 JD 칸에 입력해둔 내용이 있다면 주요업무 칸으로 임시 표시합니다.
          if (!contextDraft.keyTasks && stored.jd) {
            contextDraft.keyTasks = stored.jd;
          }
        }
        return contextDraft;
      }

      function hasRequiredPositionContext(positionId = selectedPositionId) {
        const context = getStoredPositionContext(positionId);
        const keyTasks = context?.keyTasks || context?.jd || "";
        return Boolean(context && keyTasks.trim().length >= 10);
      }

      function updateContextField(field, value) {
        const draft = getContextDraft();
        draft[field] = value;
      }

      function savePositionContext() {
        const draft = getContextDraft();
        if (!draft.keyTasks.trim()) {
          alert("주요업무를 입력해주세요. AI 분석은 포지션의 주요업무를 기준으로 진행됩니다.");
          return;
        }

        const all = getAllPositionContexts();
        all[selectedPositionId] = {
          keyTasks: draft.keyTasks.trim(),
          requiredQualifications: draft.requiredQualifications.trim(),
          preferredQualifications: draft.preferredQualifications.trim(),
          coreCompetencies: draft.coreCompetencies.trim(),
          updatedAt: formatDate(),
        };
        setAllPositionContexts(all);
        contextDraft = { positionId: selectedPositionId, ...all[selectedPositionId] };
        alert("포지션 분석 기준이 저장되었습니다.");
        render();
      }

      function resetPositionContextDraft() {
        const ok = confirm("현재 입력 중인 포지션 컨텍스트를 저장된 내용으로 되돌릴까요?");
        if (!ok) return;
        contextDraft = null;
        render();
      }

      function getGuideContext(position = getSelectedPosition()) {
        const competencies = position?.competencies || [];
        const standardQuestions = competencies.flatMap((section) =>
          (section.questions || []).map((q) => ({
            competency: section.name,
            question: q.main,
            type: q.type,
          }))
        );

        return {
          guideTitle: position?.guideTitle || "",
          guideSummary: position?.summary || "",
          guideCompetencies: competencies.map((item) => ({
            id: item.id,
            name: item.name,
            order: item.order,
            points: (item.questions || []).flatMap((q) => q.points || []).slice(0, 8),
          })),
          standardQuestions,
        };
      }

      function getAnalysisPositionContext() {
        const position = getSelectedPosition();
        const stored = getStoredPositionContext(selectedPositionId) || getDefaultContext(position);
        const guide = getGuideContext(position);
        return {
          positionId: position?.id || "",
          positionName: position?.name || "",
          keyTasks: normalizeList(stored.keyTasks || stored.jd),
          requiredQualifications: normalizeList(stored.requiredQualifications),
          preferredQualifications: normalizeList(stored.preferredQualifications),
          coreCompetencies: splitCommaOrLine(stored.coreCompetencies),
          guide,
        };
      }

      function getAllCandidates() {
        try {
          return JSON.parse(localStorage.getItem(CANDIDATE_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllCandidates(data) {
        localStorage.setItem(CANDIDATE_STORAGE_KEY, JSON.stringify(data));
      }

      function getAllCustomQuestions() {
        try {
          return JSON.parse(localStorage.getItem(CUSTOM_QUESTION_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllCustomQuestions(data) {
        localStorage.setItem(CUSTOM_QUESTION_STORAGE_KEY, JSON.stringify(data));
      }

      function getQuestionRubric() {
        return {
          purpose: "후보자 이력서에 기재된 특정 경험의 실제 수행 범위, 본인 기여도, 성과 근거를 확인합니다.",
          good: "이력서에 기재된 경험을 본인 역할, 판단 기준, 실행 과정, 결과 근거와 함께 구체적으로 설명합니다.",
          average: "경험 자체는 설명하나 본인 기여도나 성과 근거가 일부 불명확합니다.",
          weak: "팀 성과를 일반적으로 설명하거나 실제 수행 범위, 수치 기준, 의사결정 내용을 명확히 답변하지 못합니다.",
        };
      }

      function cleanupGeneratedText(value) {
        return String(value || "")
          .replace(/\[[0-9]+p\]/gi, "")
          .replace(/<PARSED TEXT[^>]*>/gi, "")
          .replace(/\s{2,}/g, " ")
          .replace(/[  ]+/g, "")
          .trim();
      }

      function shortenLongQuotedText(value) {
        return cleanupGeneratedText(value).replace(/[“"]([^“”"]{80,})[”"]/g, (match, inner) => {
          const compact = inner.replace(/\s+/g, " ").trim();
          return `“${compact.slice(0, 45)}...”`;
        });
      }

      function normalizeQuestion(question, index) {
        const rubric = getQuestionRubric();
        return {
          id: question.id || `ai_question_${Date.now()}_${index}`,
          type: question.type || "AI 이력서 기반",
          main: shortenLongQuotedText(question.main || question.question || ""),
          follow: normalizeList(question.follow || question.followUp),
          points: normalizeList(question.points || question.checkPoints || question.verificationFocus),
          intent: shortenLongQuotedText(question.intent || ""),
          sourceEvidence: shortenLongQuotedText(question.sourceEvidence || question.evidence || ""),
          relatedCompetency: cleanupGeneratedText(question.relatedCompetency || ""),
          rubric: {
            purpose: question.intent || rubric.purpose,
            good: rubric.good,
            average: rubric.average,
            weak: rubric.weak,
          },
        };
      }

      function normalizeJdFit(item, index) {
        return {
          id: item.id || `jd_fit_${Date.now()}_${index}`,
          competency: cleanupGeneratedText(item.competency || item.name || item.title || `JD 역량 ${index + 1}`),
          score: Number(item.score || item.fitScore || 0),
          evidence: shortenLongQuotedText(item.evidence || item.reason || item.rationale || ""),
        };
      }

      function normalizeAnalysis(raw) {
        const questions = (raw.customQuestions || raw.recommendedQuestions || raw.questions || []).map(normalizeQuestion);
        const jdFit = (raw.jdFit || raw.jdCompetencyFit || raw.competencyFit || []).map(normalizeJdFit);
        return {
          overallFitScore: Number(raw.overallFitScore || raw.fitScore || raw.score || 0),
          summary: shortenLongQuotedText(raw.summary || raw.candidateSummary || ""),
          jdFit,
          strengths: normalizeList(raw.strengths),
          concerns: normalizeList(raw.concerns || raw.risks),
          verificationPoints: normalizeList(raw.verificationPoints || raw.checkPoints),
          questions,
        };
      }

      async function handlePdfUpload(input) {
        const file = input.files?.[0];
        if (!file) return;

        if (!file.name.toLowerCase().endsWith(".pdf")) {
          alert("PDF 파일만 업로드할 수 있습니다.");
          input.value = "";
          return;
        }

        isPdfParsing = true;
        errorMessage = "";
        render();

        try {
          const buffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;
          const maxPages = Math.min(pdf.numPages, 20);
          const pages = [];

          for (let pageNumber = 1; pageNumber <= maxPages; pageNumber++) {
            const page = await pdf.getPage(pageNumber);
            const content = await page.getTextContent();
            const text = content.items.map((item) => item.str).join(" ");
            pages.push(`[${pageNumber}p] ${text}`);
          }

          resumeText = pages.join("\n\n").trim();
          if (!resumeText) {
            errorMessage = "PDF에서 텍스트를 추출하지 못했습니다. 이미지형 PDF라면 텍스트를 직접 붙여넣어 주세요.";
          }
        } catch (error) {
          console.error(error);
          errorMessage = "PDF를 읽는 중 오류가 발생했습니다. 텍스트를 직접 붙여넣어 주세요.";
        } finally {
          isPdfParsing = false;
          render();
        }
      }

      function validateAnalysisInputs() {
        if (!hasRequiredPositionContext()) {
          alert("먼저 이 포지션의 주요업무를 등록해주세요. 주요업무가 있어야 포지션 기준으로 이력서를 분석할 수 있습니다.");
          return false;
        }
        if (!resumeText.trim()) {
          alert("이력서 PDF를 업로드하거나 텍스트를 붙여넣어 주세요.");
          return false;
        }
        return true;
      }

      function buildPrompt() {
        const positionContext = getAnalysisPositionContext();
        const existingQuestions = positionContext.guide.standardQuestions.slice(0, 100).map((item, index) => `${index + 1}. [${item.competency}] ${item.question}`).join("\n");

        return `당신은 채용담당자와 현업 면접관을 돕는 시니어 HRBP/채용 면접 설계자입니다.
아래 [HR 등록 포지션 분석 기준]과 [지원자 이력서 텍스트]를 바탕으로, 면접관이 바로 읽을 수 있는 사전 검토 브리프를 작성하세요.

핵심 목표:
- 이력서 원문을 복사해 붙여넣지 말고, 이력서에 담긴 경험을 해석해 JD 기준의 의미로 바꿔 작성하세요.
- JD 문장을 그대로 반복하지 말고, JD 요구사항을 면접 평가 언어로 재구성하세요.
- 결과물은 "이 후보자가 어떤 경험을 가지고 있고, 그 경험이 이 포지션에서 어떤 의미가 있으며, 면접에서 무엇을 확인해야 하는지"가 자연스럽게 드러나야 합니다.

출력 톤:
- HR이 면접관에게 전달하는 사전 검토 메모처럼 작성하세요.
- 자연스러운 문장으로 작성하세요. 기계적으로 "이력서에서는 ~ 내용이 확인되며" 같은 표현을 반복하지 마세요.
- 후보자의 경험을 긍정적으로 해석하되, 근거가 부족한 부분은 차분하게 검증 필요 사항으로 남기세요.
- 사용자가 예시로 든 문장처럼 작성하세요. 예: "평가제도 설계부터 온보딩, 노무 이슈까지 HR 전반을 실제로 '작동'시킨 경험이 인상적입니다. 다만, 각 프로젝트에서 '왜 그 방향을 선택했는지' 의사결정 맥락이 빠져있어, HRBP로서의 전략적 판단력은 면접에서 추가 확인이 필요합니다."

절대 금지:
- 이력서 본문 또는 JD 문장을 긴 따옴표로 그대로 가져오지 마세요.
- OCR 텍스트의 페이지 표기, 깨진 문자, 불필요한 띄어쓰기, 원문 문단을 그대로 출력하지 마세요. 예: "[1p]", "기 반 백 엔 드", 긴 원문 복사 금지.
- "이력서에서는 ‘...긴 원문...’ 내용이 우선적으로 확인되며" 같은 표현을 쓰지 마세요.
- "필수자격/필요경험 중 ‘...JD 원문...’에 대해서는"처럼 JD 항목을 그대로 붙이지 마세요.
- "커뮤니케이션 능력이 좋아 보입니다", "문제해결력이 있습니다"처럼 이력서 없이도 쓸 수 있는 일반론을 쓰지 마세요.
- 합격/불합격을 판단하지 마세요. 면접 전 검토 보조자료만 작성하세요.
- 민감정보, 차별 소지가 있는 내용, 사생활 질문은 제외하세요.

근거 사용 방식:
- 이력서 근거는 프로젝트명, 업무명, 성과 수치, 경력 흐름 정도만 짧게 언급하세요.
- 근거를 언급할 때도 원문을 그대로 복사하지 말고, "평가제도 설계와 SaaS 도입", "ATS 전환을 통한 채용 리드타임 개선", "포괄임금제 로직 개선"처럼 요약해 표현하세요.
- sourceEvidence 필드는 원문 전체가 아니라 근거가 되는 경험명/성과명만 짧게 적으세요.

점수 산정 기준:
- overallFitScore는 0~100 정수로 산정하세요.
- JD 역량별 score도 0~100 정수로 산정하세요.
- 90점 이상: JD 요구와 이력서 근거가 매우 직접적이고, 성과/역할/맥락이 구체적임
- 80~89점: JD와 직접 연결되는 경험이 충분하나 일부 판단 근거 또는 깊이 확인 필요
- 70~79점: 관련 경험은 있으나 전략적 판단, 의사결정 맥락, 성과 근거가 일부 불명확함
- 60~69점: 간접 경험 위주이거나 JD 핵심업무와의 연결성이 제한적임
- 60점 미만: 이력서상 근거가 부족함
- 점수를 후하게 주지 마세요. 경험이 있어도 본인 역할, 의사결정 기준, 성과 산정 방식이 불명확하면 70점대로 조정하세요.

출력 품질 기준:
1. overallFitScore
- 0~100 정수로 작성하세요.

2. summary
- 첫 문장에는 반드시 "[점수]/100 종합 적합도" 형식을 포함하세요.
- 2~4문장으로 작성하세요.
- 경력 흐름, JD와의 강한 연결점, 가장 중요한 추가 검증 필요 사항을 모두 포함하세요.
- 원문 인용 대신 해석 문장으로 작성하세요.
- 나쁜 예: "이력서에서는 '[1p] Java/Spring 기반...' 내용이 확인됩니다."
- 좋은 예: "백엔드 개발과 레거시 전환, 외부 시스템 연동 경험은 확인되지만, 해당 포지션에서 요구하는 Next.js 기반 프론트엔드 서비스 개발 경험은 이력서상 직접 근거가 제한적입니다."

3. jdFit
- HR 등록 포지션 분석 기준을 바탕으로 JD 핵심 역량 3~5개를 도출하세요.
- 각 항목은 competency, score, evidence로 작성하세요.
- competency는 "문제 정의 및 구조화 능력", "리더 파트너십 및 조직 진단", "HR 제도 설계 및 안착", "실행력 및 변화 주도"처럼 면접관이 이해하기 쉬운 명칭으로 쓰세요.
- evidence는 1~3문장으로 작성하세요.
- evidence에는 이력서상 확인되는 경험을 해석한 내용과 아직 면접에서 확인해야 할 한계를 함께 쓰세요.
- evidence는 원문을 복사하지 말고 자연스러운 평가 문장으로 작성하세요.

4. verificationPoints
- 4~6개 작성하세요.
- 면접에서 확인해야 할 항목을 구체적으로 작성하세요.
- 각 항목은 “무엇을 / 왜 확인해야 하는지”가 드러나야 합니다.
- 검증 포인트도 원문/JD 복사가 아니라, 경험 해석 기반으로 작성하세요.

5. customQuestions
- 6개 작성하세요.
- 모든 질문은 후보자의 이력서에 적힌 특정 경험/프로젝트/성과를 바탕으로 작성하되, 긴 원문을 그대로 복사하지 마세요.
- 질문은 아래 목적 중 하나 이상을 충족해야 합니다.
  a) 본인 기여도 확인
  b) 성과 수치/개선 효과의 산정 기준 확인
  c) 주요업무와 실제 경험의 연결성 확인
  d) 필수자격/필요경험의 깊이 확인
  e) 팀 성과와 개인 역할 구분
  f) 우려사항 해소
- “가장 어려웠던 경험을 말해주세요”처럼 모든 후보자에게 물을 수 있는 질문은 금지합니다.
- sourceEvidence에는 원문 문장 전체가 아니라 "전사 평가제도 기획 및 SaaS툴 도입", "리드타임 평균 3일 단축"처럼 짧은 근거 라벨을 적으세요.

좋지 않은 질문 예시:
- 협업 과정에서 어려웠던 경험을 말씀해주세요.
- 문제를 해결했던 경험을 말씀해주세요.
- 우리 회사에 지원한 이유는 무엇인가요?
- 이력서에 적힌 "[1p] Java/Spring 기 반 백 엔 드 개 발 자..." 내용에 대해 설명해 주세요.

좋은 질문 예시:

- ATS 전환으로 채용 리드타임을 단축한 경험에서, 병목을 어떻게 정의했고 본인이 직접 바꾼 프로세스는 무엇이었는지 설명해 주세요.
- 포괄임금제 로직 개선 과정에서 법적 리스크와 비용 부담 사이의 균형을 어떤 기준으로 판단했는지 설명해 주세요.

      function getAnalysisSchema() {
        return {
          type: "object",
          additionalProperties: false,
          properties: {
            overallFitScore: { type: "number" },
            summary: { type: "string" },
            jdFit: {
              type: "array",
              minItems: 3,
              maxItems: 5,
              items: {
                type: "object",
                additionalProperties: false,
                properties: {
                  competency: { type: "string" },
                  score: { type: "number" },
                  evidence: { type: "string" },
                },
                required: ["competency", "score", "evidence"],
              },
            },
            verificationPoints: { type: "array", items: { type: "string" } },
            customQuestions: {
              type: "array",
              minItems: 4,
              maxItems: 8,
              items: {
                type: "object",
                additionalProperties: false,
                properties: {
                  type: { type: "string" },
                  main: { type: "string" },
                  follow: { type: "array", items: { type: "string" } },
                  intent: { type: "string" },
                  relatedCompetency: { type: "string" },
                  sourceEvidence: { type: "string" },
                  points: { type: "array", items: { type: "string" } },
                },
                required: ["type", "main", "follow", "intent", "relatedCompetency", "sourceEvidence", "points"],
              },
            },
          },
          required: ["overallFitScore", "summary", "jdFit", "verificationPoints", "customQuestions"],
        };
      }
      function extractOutputText(data) {
        if (data.output_text) return data.output_text;
        const chunks = [];
        (data.output || []).forEach((item) => {
          (item.content || []).forEach((content) => {
            if (content.text) chunks.push(content.text);
            if (content.type === "output_text" && content.text) chunks.push(content.text);
          });
        });
        return chunks.join("\n");
      }

      async function analyzeResume() {
        if (!apiKey.trim()) {
          alert("OpenAI API Key를 입력해주세요. 데모용으로 브라우저 세션에만 보관됩니다.");
          return;
        }
        if (!validateAnalysisInputs()) return;

        isAnalyzing = true;
        errorMessage = "";
        selectedQuestionIds = {};
        sessionStorage.setItem("dozn_openai_api_key", apiKey.trim());
        sessionStorage.setItem("dozn_openai_model", modelName.trim() || "gpt-4.1-mini");
        render();

        try {
          const response = await fetch("https://api.openai.com/v1/responses", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${apiKey.trim()}`,
            },
            body: JSON.stringify({
              model: modelName.trim() || "gpt-4.1-mini",
              store: false,
              input: [
                {
                  role: "system",
                  content: [
                    {
                      type: "input_text",
                      text: "당신은 채용담당자와 현업 면접관을 돕는 HR 어시스턴트입니다. 모든 응답은 한국어로 작성하고, 반드시 요청한 JSON 구조만 반환하세요.",
                    },
                  ],
                },
                {
                  role: "user",
                  content: [
                    {
                      type: "input_text",
                      text: buildPrompt(),
                    },
                  ],
                },
              ],
              text: {
                format: {
                  type: "json_schema",
                  name: "resume_interview_analysis",
                  strict: true,
                  schema: getAnalysisSchema(),
                },
              },
            }),
          });

          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error?.message || "AI 분석 요청에 실패했습니다.");
          }

          const outputText = extractOutputText(data);
          if (!outputText) throw new Error("AI 응답에서 분석 결과를 찾지 못했습니다.");

          analysisResult = normalizeAnalysis(JSON.parse(outputText));
          analysisResult.questions.forEach((question) => {
            selectedQuestionIds[question.id] = true;
          });
        } catch (error) {
          console.error(error);
          errorMessage = error.message || "AI 분석 중 오류가 발생했습니다.";
        } finally {
          isAnalyzing = false;
          render();
        }
      }

      function getKeywordCandidates(text) {
        const clean = String(text || "").replace(/[\[\]{}()<>]/g, " ");
        const words = clean.match(/[A-Za-z0-9가-힣+#.]{2,}/g) || [];
        const stop = new Set(["업무", "경험", "관련", "지원", "필수", "우대", "포지션", "담당", "자격", "역량", "능력", "이상", "이하", "대한", "통해", "기반", "진행", "관리", "운영", "개선", "확인", "필요", "가능", "활용", "수행", "주요", "담당자", "개발자", "서비스", "프로젝트"]);
        const counts = {};
        words.forEach((word) => {
          const w = word.trim();
          if (w.length < 2 || stop.has(w)) return;
          counts[w] = (counts[w] || 0) + 1;
        });
        return Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 16).map(([word]) => word);
      }

      function splitResumeSentences() {
        return resumeText
          .replace(/\r/g, "\n")
          .split(/\n+|(?<=[.!?。])\s+|(?<=다\.)\s+|(?<=요\.)\s+|(?<=함\.)\s+|(?<=됨\.)\s+/)
          .map((item) => item.replace(/\s+/g, " ").trim())
          .filter((item) => item.length >= 18)
          .slice(0, 120);
      }

      function shortenEvidence(text, max = 150) {
        const clean = String(text || "").replace(/\s+/g, " ").trim();
        return clean.length > max ? `${clean.slice(0, max)}...` : clean;
      }

      function getScoredEvidence(keywords = []) {
        const sentences = splitResumeSentences();
        const scored = sentences.map((sentence, index) => {
          const score = keywords.reduce((sum, keyword) => sum + (sentence.includes(keyword) ? 2 : 0), 0) + Math.max(0, 4 - index * 0.03);
          return { sentence, score };
        });

        const picked = scored
          .sort((a, b) => b.score - a.score)
          .map((item) => item.sentence)
          .filter((sentence, index, arr) => arr.findIndex((other) => other.slice(0, 45) === sentence.slice(0, 45)) === index)
          .slice(0, 8)
          .map((item) => shortenEvidence(item));

        if (picked.length < 4) {
          sentences.slice(0, 8).forEach((sentence) => {
            if (picked.length < 4 && !picked.includes(sentence)) picked.push(shortenEvidence(sentence));
          });
        }
        return picked;
      }

      function firstItem(list, fallback) {
        return Array.isArray(list) && list.length ? list[0] : fallback;
      }

      function saveToGuide() {
        if (!analysisResult) {
          alert("먼저 분석 결과를 생성해주세요.");
          return;
        }
        const name = candidateName.trim();
        if (!name) {
          alert("후보자명을 입력해주세요.");
          return;
        }

        const selectedQuestions = analysisResult.questions.filter((question) => selectedQuestionIds[question.id]);
        if (!selectedQuestions.length) {
          alert("구조화면접 가이드에 추가할 질문을 1개 이상 선택해주세요.");
          return;
        }

        const allCandidates = getAllCandidates();
        const candidates = allCandidates[selectedPositionId] || [];
        const candidateId = `candidate_${Date.now()}`;
        const newCandidate = {
          id: candidateId,
          name,
          createdAt: formatDate(),
          aiBrief: {
            overallFitScore: analysisResult.overallFitScore,
            summary: analysisResult.summary,
            jdFit: analysisResult.jdFit || [],
            strengths: analysisResult.strengths,
            concerns: analysisResult.concerns,
            verificationPoints: analysisResult.verificationPoints,
          },
        };

        candidates.unshift(newCandidate);
        allCandidates[selectedPositionId] = candidates;
        setAllCandidates(allCandidates);

        const sessionKey = `${selectedPositionId}__${candidateId}`;
        const allCustomQuestions = getAllCustomQuestions();
        allCustomQuestions[sessionKey] = selectedQuestions.map((question, index) => ({
          id: `ai_custom_${Date.now()}_${index}`,
          type: question.type || "AI 이력서 기반",
          main: question.main,
          follow: question.follow || [],
          points: question.points?.length ? question.points : [question.relatedCompetency || "이력서 기반 검증"],
          intent: shortenLongQuotedText(question.intent || ""),
          sourceEvidence: question.sourceEvidence || "",
          relatedCompetency: cleanupGeneratedText(question.relatedCompetency || ""),
          rubric: question.rubric || getQuestionRubric(),
        }));
        setAllCustomQuestions(allCustomQuestions);

        window.location.href = `index.html?positionId=${encodeURIComponent(selectedPositionId)}&candidateId=${encodeURIComponent(candidateId)}`;
      }

                    </span>
                  </div>
                  ${!contextReady ? `<div class="mb-5 rounded-2xl border border-amber-100 bg-amber-50 px-4 py-3 text-sm leading-6 text-amber-800">먼저 왼쪽의 HR 포지션 분석 기준 영역에 주요업무를 저장해주세요. 주요업무가 있어야 이력서 없이도 나올 수 있는 평이한 질문이 아니라, 해당 포지션 기준의 검증 질문을 생성할 수 있습니다.</div>` : ""}
                  ${errorMessage ? `<div class="mb-5 rounded-2xl border border-rose-100 bg-rose-50 px-4 py-3 text-sm leading-6 text-rose-700">${escapeHtml(errorMessage)}</div>` : ""}
                  ${renderAnalysisCards()}
                </section>

                ${renderQuestionList()}

                <section class="rounded-[32px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                    <div>
                      <p class="text-sm font-medium text-slate-500">구조화면접 가이드 연결</p>
                      <h2 class="mt-1 text-xl font-semibold text-slate-900">선택한 질문을 후보자 세션에 추가</h2>
                      <p class="mt-2 text-sm leading-6 text-slate-500">후보자명, AI 브리프, 선택 질문이 저장되고 해당 후보자의 면접 페이지로 이동합니다.</p>
                    </div>
                    <button onclick="saveToGuide()" class="rounded-full bg-orange-500 px-6 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(249,115,22,0.25)] transition hover:bg-orange-600 disabled:opacity-50" ${!analysisResult ? "disabled" : ""}>
                      구조화면접 가이드에 추가
                    </button>
                  </div>
                </section>
              </main>
            </div>
          </div>
        `;
      }

      window.handlePdfUpload = handlePdfUpload;
      window.analyzeResume = analyzeResume;
      window.generateDemoAnalysis = generateDemoAnalysis;
      window.toggleQuestion = toggleQuestion;
      window.saveToGuide = saveToGuide;
      window.updateContextField = updateContextField;
      window.savePositionContext = savePositionContext;
      window.resetPositionContextDraft = resetPositionContextDraft;
      window.selectPosition = selectPosition;

      render();
    </script>
  </body>
</html>
