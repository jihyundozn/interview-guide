<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>더즌 구조화 면접 가이드</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: #1e293b;
        background: linear-gradient(135deg, #edf5ff 0%, #dcecff 40%, #eef3ff 100%);
      }

      body {
        min-height: 100vh;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .bg-orb-1,
      .bg-orb-2,
      .bg-orb-3 {
        position: fixed;
        pointer-events: none;
        filter: blur(40px);
        z-index: 0;
      }

      .bg-orb-1 {
        top: -80px;
        left: -80px;
        width: 340px;
        height: 340px;
        border-radius: 48px;
        background: radial-gradient(circle at top left, rgba(255, 232, 246, 0.65), rgba(255, 255, 255, 0) 70%);
      }

      .bg-orb-2 {
        top: 40px;
        right: 0;
        width: 420px;
        height: 420px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(176, 213, 255, 0.35), rgba(255, 255, 255, 0) 70%);
      }

      .bg-orb-3 {
        bottom: 0;
        left: 30%;
        width: 300px;
        height: 300px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(220, 236, 255, 0.55), rgba(255, 255, 255, 0) 72%);
      }

      .app-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      .pdf-root {
        background: white;
      }

      .pdf-break-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    </style>
  </head>
  <body>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>

    <div id="app" class="app-shell"></div>

    <script src="interview-data.js"></script>
    <script>
      const app = document.getElementById("app");

      let currentPage = "landing";
      let selectedPositionId = window.INTERVIEW_DATA.positions[0]?.id || "";
      let activeNav =
        window.INTERVIEW_DATA.positions[0]?.competencies?.[0]?.id || "final-review";
      let showPdfPreview = false;
      let showCautionModal = false;

      let selectedScores = {};
      let formStateByPosition = {};

      function getSelectedPosition() {
        return (
          window.INTERVIEW_DATA.positions.find(
            (position) => position.id === selectedPositionId
          ) || window.INTERVIEW_DATA.positions[0]
        );
      }

      function getCompetencies() {
        return getSelectedPosition()?.competencies || [];
      }

      function getNavItems() {
        return [
          ...getCompetencies().map((item) => ({
            id: item.id,
            name: item.name,
            order: item.order,
          })),
          {
            id: "final-review",
            name: "최종평가",
            order: "면접 결과 정리",
          },
        ];
      }

      function getDefaultFormState() {
        return {
          candidateName: "",
          interviewer: "",
          interviewDate: "",
          overallComment: "",
          followUpCheck: "",
          finalDecision:
            window.INTERVIEW_DATA.finalOptions?.[0] || "추천",
          questionMemos: {},
        };
      }

      function getFormState() {
        if (!formStateByPosition[selectedPositionId]) {
          formStateByPosition[selectedPositionId] = getDefaultFormState();
        }
        return formStateByPosition[selectedPositionId];
      }

      function getQuestionMemo(sectionId, questionIndex) {
        const form = getFormState();
        const key = `${sectionId}__${questionIndex}`;
        return form.questionMemos[key] || "";
      }

      function setQuestionMemo(sectionId, questionIndex, value) {
        const form = getFormState();
        const key = `${sectionId}__${questionIndex}`;
        form.questionMemos[key] = value;
      }

      function updateFormField(field, value) {
        const form = getFormState();
        form[field] = value;
      }

      function setFinalDecision(decision) {
        const form = getFormState();
        form.finalDecision = decision;
        render();
      }

      function getFinalDecision() {
        return getFormState().finalDecision;
      }

      function getQuestionScore(sectionId, questionIndex) {
        const key = `${selectedPositionId}__${sectionId}__${questionIndex}`;
        return selectedScores[key] || null;
      }

      function setQuestionScore(sectionId, questionIndex, score) {
        const key = `${selectedPositionId}__${sectionId}__${questionIndex}`;
        selectedScores[key] = score;
        render();
      }

      function setSelectedPosition(id) {
        selectedPositionId = id;
        const selected = getSelectedPosition();
        activeNav = selected?.competencies?.[0]?.id || "final-review";
        render();
      }

      function startGuide() {
        const selected = getSelectedPosition();
        activeNav = selected?.competencies?.[0]?.id || "final-review";
        currentPage = "guide";
        render();

        setTimeout(() => {
          scrollToSection(activeNav);
        }, 50);
      }

      function goLanding() {
        currentPage = "landing";
        showPdfPreview = false;
        showCautionModal = false;
        render();
      }

      function openPdfPreview() {
        showPdfPreview = true;
        render();
      }

      function closePdfPreview() {
        showPdfPreview = false;
        render();
      }

      function openCautionModal() {
        showCautionModal = true;
        render();
      }

      function closeCautionModal() {
        showCautionModal = false;
        render();
      }

      function scrollToSection(id) {
        activeNav = id;
        render();

        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
          }
        }, 10);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function nl2br(value) {
        return escapeHtml(value).replace(/\n/g, "<br>");
      }

      function renderLanding() {
        const data = window.INTERVIEW_DATA;

        return `
          <div class="relative mx-auto flex min-h-screen max-w-7xl items-center px-6 py-10 md:px-10 lg:px-14">
            <div class="mx-auto w-full max-w-4xl rounded-[32px] border border-white/60 bg-white/70 p-6 shadow-[0_20px_60px_rgba(81,116,173,0.12)] backdrop-blur md:p-8">
              <div class="mb-8 text-center">
                <p class="mb-3 text-sm font-medium tracking-[0.18em] text-slate-500">DOZN INTERVIEW GUIDE</p>
                <h1 class="text-4xl font-semibold tracking-tight text-slate-900 md:text-5xl">${data.siteTitle}</h1>
                <p class="mx-auto mt-4 max-w-2xl text-sm leading-7 text-slate-600 md:text-base">
                  ${data.siteDescription}
                </p>
              </div>

              <div class="mx-auto max-w-2xl rounded-[28px] border border-slate-200/70 bg-white/90 p-6 shadow-sm md:p-7">
                <div class="mb-5 text-center">
                  <h2 class="text-2xl font-semibold text-slate-900">${data.labels.openPositions}</h2>
                  <p class="mt-2 text-sm text-slate-500">${data.labels.selectPositionGuide}</p>
                </div>

                <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  ${data.positions
                    .map(
                      (position) => `
                    <button
                      onclick="setSelectedPosition('${position.id}')"
                      class="rounded-2xl border px-4 py-4 text-base font-medium transition ${
                        selectedPositionId === position.id
                          ? "border-blue-400 bg-blue-50 text-blue-700 shadow-sm"
                          : "border-slate-200 bg-white text-slate-700 hover:border-blue-200 hover:bg-blue-50/40"
                      }"
                    >
                      ${position.name}
                    </button>
                  `
                    )
                    .join("")}
                </div>

                <div class="mt-6 flex items-center justify-between gap-3 border-t border-slate-200 pt-5">
                  <p class="text-sm text-slate-500">현재 오픈 포지션 ${data.positions.length}개</p>
                  <button
                    onclick="startGuide()"
                    class="rounded-full bg-[linear-gradient(90deg,#3b82f6,#69a4ff)] px-6 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(59,130,246,0.28)] transition hover:scale-[1.01]"
                  >
                    ${data.labels.startGuide}
                  </button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderGuide() {
        const data = window.INTERVIEW_DATA;
        const selected = getSelectedPosition();
        const competencies = getCompetencies();
        const navItems = getNavItems();
        const form = getFormState();
        const currentFinalDecision = getFinalDecision();

        return `
          <div class="relative mx-auto max-w-7xl px-6 py-10 md:px-10 lg:px-14">
            <div class="mb-6 flex flex-wrap items-center justify-between gap-3">
              <div>
                <div class="mb-2 inline-flex items-center rounded-full border border-white/70 bg-white/70 px-3 py-1 text-xs font-medium text-slate-500 backdrop-blur">
                  선택 포지션 · ${selected.name}
                </div>
                <h2 class="text-3xl font-semibold tracking-tight text-slate-900">
                  ${selected.guideTitle || `${selected.name} 구조화 면접 가이드`}
                </h2>
                <p class="mt-2 text-sm leading-6 text-slate-600">
                  ${selected.summary || ""}
                </p>
              </div>
              <div class="flex gap-2">
                <button
                  onclick="goLanding()"
                  class="rounded-full border border-slate-200 bg-white/85 px-4 py-2 text-sm font-medium text-slate-700 shadow-sm backdrop-blur"
                >
                  ← 포지션 다시 선택
                </button>
                <button
                  onclick="openCautionModal()"
                  class="rounded-full border border-blue-200 bg-blue-50 px-4 py-2 text-sm font-medium text-blue-700 shadow-sm"
                >
                  ${data.labels.cautionButton}
                </button>
              </div>
            </div>

            <div class="mb-8 grid gap-4 lg:grid-cols-3">
              <div class="rounded-3xl border border-white/70 bg-white/78 p-5 shadow-sm backdrop-blur">
                <p class="text-sm font-semibold text-slate-900">${data.labels.coreCompetencies}</p>
                <div class="mt-3 flex flex-wrap gap-2">
                  ${competencies
                    .map(
                      (item) => `
                    <span class="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-700">
                      ${item.name}
                    </span>
                  `
                    )
                    .join("")}
                </div>
              </div>

              <div class="rounded-3xl border border-white/70 bg-white/78 p-5 shadow-sm backdrop-blur">
                <p class="text-sm font-semibold text-slate-900">${data.labels.interviewRules}</p>
                <ul class="mt-3 space-y-2 text-sm leading-6 text-slate-600">
                  ${data.interviewRules.map((rule) => `<li>${rule}</li>`).join("")}
                </ul>
              </div>

              <div class="rounded-3xl border border-white/70 bg-white/78 p-5 shadow-sm backdrop-blur">
                <p class="text-sm font-semibold text-slate-900">${data.labels.scoreScale}</p>
                <div class="mt-3 grid grid-cols-5 gap-2 text-center text-xs text-slate-600">
                  ${[1, 2, 3, 4, 5]
                    .map(
                      (score) => `
                    <div class="rounded-2xl bg-slate-100 px-2 py-3 font-semibold">
                      ${score}점
                    </div>
                  `
                    )
                    .join("")}
                </div>
                <p class="mt-3 text-sm leading-6 text-slate-500">${data.scoreGuide}</p>
              </div>
            </div>

            <div class="grid gap-6 xl:grid-cols-[260px_minmax(0,1fr)]">
              <aside class="h-fit rounded-[28px] border border-white/70 bg-white/80 p-4 shadow-sm backdrop-blur xl:sticky xl:top-6">
                <p class="mb-3 px-2 text-sm font-semibold text-slate-900">${data.labels.questionSet}</p>
                <div class="space-y-2">
                  ${navItems
                    .map(
                      (item) => `
                    <button
                      onclick="scrollToSection('${item.id}')"
                      class="w-full rounded-2xl px-4 py-3 text-left transition ${
                        activeNav === item.id
                          ? "bg-blue-50 text-blue-700"
                          : "bg-slate-50 text-slate-700 hover:bg-slate-100"
                      }"
                    >
                      <div class="text-sm font-semibold">${item.name}</div>
                      <div class="mt-1 text-xs text-slate-500">${item.order}</div>
                    </button>
                  `
                    )
                    .join("")}
                </div>
              </aside>

              <main class="space-y-6">
                ${competencies
                  .map(
                    (section) => `
                  <section
                    id="${section.id}"
                    class="rounded-[30px] border border-white/70 bg-white/85 p-5 shadow-sm backdrop-blur md:p-6"
                  >
                    <div class="mb-5 flex flex-wrap items-center justify-between gap-3 border-b border-slate-100 pb-4">
                      <div>
                        <p class="text-sm font-medium text-blue-600">${section.order}</p>
                        <h3 class="mt-1 text-2xl font-semibold text-slate-900">${section.name}</h3>
                      </div>
                      <span class="rounded-full bg-slate-100 px-3 py-1 text-sm text-slate-600">질문 ${section.questions.length}개</span>
                    </div>

                    <div class="space-y-5">
                      ${section.questions
                        .map(
                          (q, qIndex) => `
                        <div class="rounded-[26px] border border-slate-200/80 bg-slate-50/70 p-5">
                          <div class="mb-4 flex flex-wrap items-center justify-between gap-3">
                            <span class="rounded-full bg-white px-3 py-1 text-xs font-semibold text-slate-600 shadow-sm">
                              ${q.type}
                            </span>
                            <div class="flex gap-2">
                              ${[1, 2, 3, 4, 5]
                                .map((s) => {
                                  const selectedScore = getQuestionScore(section.id, qIndex);
                                  return `
                                    <button
                                      onclick="setQuestionScore('${section.id}', ${qIndex}, ${s})"
                                      class="h-9 w-9 rounded-full border text-sm font-semibold transition ${
                                        selectedScore === s
                                          ? "border-blue-500 bg-blue-50 text-blue-700"
                                          : "border-slate-200 bg-white text-slate-500 hover:border-blue-200 hover:bg-blue-50/40"
                                      }"
                                    >
                                      ${s}
                                    </button>
                                  `;
                                })
                                .join("")}
                            </div>
                          </div>

                          <div class="grid gap-5 lg:grid-cols-[minmax(0,1.2fr)_minmax(320px,0.8fr)]">
                            <div>
                              <p class="text-sm font-semibold text-slate-500">${data.labels.mainQuestion}</p>
                              <p class="mt-2 text-lg font-medium leading-8 text-slate-900">${q.main}</p>

                              <div class="mt-5">
                                <p class="text-sm font-semibold text-slate-500">${data.labels.followUp}</p>
                                <ul class="mt-2 space-y-2 text-sm leading-7 text-slate-700">
                                  ${q.follow
                                    .map(
                                      (f) => `
                                    <li class="rounded-2xl bg-white px-4 py-3 shadow-sm">${f}</li>
                                  `
                                    )
                                    .join("")}
                                </ul>
                              </div>

                              <div class="mt-5">
                                <p class="text-sm font-semibold text-slate-500">${data.labels.checkPoints}</p>
                                <div class="mt-2 flex flex-wrap gap-2">
                                  ${q.points
                                    .map(
                                      (p) => `
                                    <span class="rounded-full bg-blue-50 px-3 py-1 text-sm text-blue-700">${p}</span>
                                  `
                                    )
                                    .join("")}
                                </div>
                              </div>
                            </div>

                            <div class="space-y-4">
                              <div class="rounded-2xl border border-blue-100 bg-white p-4">
                                <p class="text-sm font-semibold text-slate-900">${data.labels.rubric}</p>
                                <div class="mt-3 space-y-3 text-sm leading-6 text-slate-600">
                                  <div>
                                    <p class="font-semibold text-slate-700">${data.labels.purpose}</p>
                                    <p>${q.rubric.purpose}</p>
                                  </div>
                                  <div>
                                    <p class="font-semibold text-slate-700">${data.labels.goodSignal}</p>
                                    <p>${q.rubric.good}</p>
                                  </div>
                                  <div>
                                    <p class="font-semibold text-slate-700">${data.labels.averageAnswer}</p>
                                    <p>${q.rubric.average}</p>
                                  </div>
                                  <div>
                                    <p class="font-semibold text-slate-700">${data.labels.riskSignal}</p>
                                    <p>${q.rubric.weak}</p>
                                  </div>
                                </div>
                              </div>

                              <div class="rounded-2xl border border-slate-200 bg-white p-4">
                                <p class="text-sm font-semibold text-slate-900">${data.labels.memo}</p>
                                <textarea
                                  class="mt-3 h-40 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none placeholder:text-slate-400"
                                  placeholder="${data.labels.memoPlaceholder}"
                                  oninput="setQuestionMemo('${section.id}', ${qIndex}, this.value)"
                                >${escapeHtml(getQuestionMemo(section.id, qIndex))}</textarea>
                              </div>
                            </div>
                          </div>
                        </div>
                      `
                        )
                        .join("")}
                    </div>
                  </section>
                `
                  )
                  .join("")}

                <section id="final-review" class="rounded-[30px] border border-white/70 bg-white/85 p-6 shadow-sm backdrop-blur">
                  <div class="mb-5 flex items-center justify-between gap-3">
                    <div>
                      <p class="text-sm font-medium text-blue-600">${data.labels.finalReview}</p>
                      <h3 class="mt-1 text-2xl font-semibold text-slate-900">${data.labels.finalReview}</h3>
                    </div>
                    <button
                      onclick="openPdfPreview()"
                      class="rounded-full bg-[linear-gradient(90deg,#3b82f6,#69a4ff)] px-5 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(59,130,246,0.25)]"
                    >
                      ${data.labels.savePdf}
                    </button>
                  </div>

                  <div class="grid gap-4 md:grid-cols-3">
                    <input
                      class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm"
                      placeholder="${data.labels.candidateName}"
                      value="${escapeHtml(form.candidateName)}"
                      oninput="updateFormField('candidateName', this.value)"
                    />
                    <input
                      class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm"
                      placeholder="${data.labels.interviewer}"
                      value="${escapeHtml(form.interviewer)}"
                      oninput="updateFormField('interviewer', this.value)"
                    />
                    <input
                      class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm"
                      placeholder="${data.labels.interviewDate}"
                      value="${escapeHtml(form.interviewDate)}"
                      oninput="updateFormField('interviewDate', this.value)"
                    />
                  </div>

                  <div class="mt-5 grid gap-4 lg:grid-cols-2">
                    <textarea
                      class="h-40 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm"
                      placeholder="${data.labels.overallComment}"
                      oninput="updateFormField('overallComment', this.value)"
                    >${escapeHtml(form.overallComment)}</textarea>
                    <textarea
                      class="h-40 rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm"
                      placeholder="${data.labels.followUpCheck}"
                      oninput="updateFormField('followUpCheck', this.value)"
                    >${escapeHtml(form.followUpCheck)}</textarea>
                  </div>

                  <div class="mt-5">
                    <p class="mb-3 text-sm font-semibold text-slate-900">${data.labels.finalOpinion}</p>
                    <div class="flex flex-wrap gap-2">
                      ${data.finalOptions
                        .map(
                          (label) => `
                        <button
                          onclick="setFinalDecision('${label}')"
                          class="rounded-full px-4 py-2 text-sm font-semibold transition ${
                            currentFinalDecision === label
                              ? "bg-blue-600 text-white"
                              : "bg-slate-100 text-slate-700 hover:bg-slate-200"
                          }"
                        >
                          ${label}
                        </button>
                      `
                        )
                        .join("")}
                    </div>
                  </div>
                </section>
              </main>
            </div>
          </div>
        `;
      }

      function renderCautionModal() {
        if (!showCautionModal) return "";

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4 py-8 backdrop-blur-sm">
            <div class="max-h-[90vh] w-full max-w-5xl overflow-auto rounded-[32px] bg-white p-6 shadow-2xl md:p-8">
              <div class="mb-6 flex items-center justify-between gap-3 border-b border-slate-200 pb-4">
                <div>
                  <p class="text-sm font-medium text-blue-600">면접 유의사항</p>
                  <h3 class="mt-1 text-2xl font-semibold text-slate-900">면접관 TO DO & NOT TO DO</h3>
                </div>
                <button
                  onclick="closeCautionModal()"
                  class="rounded-full border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700"
                >
                  닫기
                </button>
              </div>

              <div class="rounded-[28px] bg-slate-50 p-6 md:p-8">
                <div class="text-[15px] leading-7 text-slate-700">
                  <p>후보자에게 긍정적인 면접 경험을 제공하는 데 가장 중요한 것은 면접관의 태도입니다.</p>
                  <p>면접관에게는 여러 면접 중 하나이지만, <span class="font-semibold">후보자에게는 우리 회사에서 경험할 첫 면접이자 유일한 면접</span>일 수 있습니다.</p>
                  <p>텐바이텐의 구성원이 될지 모를 후보자들이 회사에 대해 긍정적인 첫인상을 가지기 위해서는 <span class="font-semibold">면접관분들의 역할이 매우 중요합니다.</span></p>
                </div>

                <div class="mt-6 text-3xl font-bold text-slate-900">
                  ■ 면접관 <span class="text-red-600">TO</span> DO & <span class="text-red-600">NOT TO</span> DO
                </div>

                <div class="mt-8 grid gap-6 md:grid-cols-2">
                  <div class="rounded-3xl border border-slate-200 bg-white p-6">
                    <h4 class="mb-5 text-center text-4xl font-bold text-red-600">TO DO</h4>
                    <ul class="space-y-3 text-[18px] leading-8 text-slate-800">
                      <li>· 우리 회사에 호감을 가질 수 있도록 후보자를 배려하기</li>
                      <li class="pl-4 text-[16px] leading-7 text-slate-600">(예: 면접 참석에 대한 감사인사, 밝은 표정, 물 권하기 등)</li>
                      <li>· 무엇을 평가할 것인지, JD 및 평가항목/기준을 사전에 명확히 이해하기</li>
                      <li>· 면접에 활용할 질문들을 사전에 준비하기</li>
                      <li>· 모든 후보자를 공정하고 편견 없이 대하기</li>
                      <li>· 후보자가 말을 할 때는 눈을 맞추고 주의를 집중하기</li>
                      <li>· 감각이나 느낌, 추측이 아닌 관찰한 행동과 답변 내용에 초점을 맞추기</li>
                      <li>· 중요한 답변, 특이사항 등 평가의 근거가 되는 것들은 즉시 메모하기</li>
                    </ul>
                  </div>

                  <div class="rounded-3xl border border-slate-200 bg-white p-6">
                    <h4 class="mb-5 text-center text-4xl font-bold text-red-600">NOT TO DO</h4>
                    <ul class="space-y-3 text-[18px] leading-8 text-slate-800">
                      <li>· 면접시간에 지각</li>
                      <li>· 후보자를 존중하지 않거나 무시하는 태도나 말투</li>
                      <li>· 차별적인 발언 (예: 성별, 출신, 스펙, 외모 등)</li>
                      <li>· 합/불 여부를 표정, 자세로 드러내기</li>
                      <li>· 특정인 또는 특정 집단을 혐오/비하하는 발언</li>
                      <li>· 후보자의 사생활에 대한 질문</li>
                      <li class="pl-4 text-[16px] leading-7 text-slate-600">(예: 가족관계, 부모님 직업, 이성관계 등)</li>
                      <li>· 답변하기 어려운 난해한 질문</li>
                      <li>· 필요하게 후보자의 말꼬리 붙잡기</li>
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderPdfPreview() {
        if (!showPdfPreview) return "";

        const data = window.INTERVIEW_DATA;
        const selected = getSelectedPosition();
        const competencies = getCompetencies();
        const form = getFormState();
        const currentFinalDecision = getFinalDecision();

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4 py-8 backdrop-blur-sm">
            <div class="max-h-[90vh] w-full max-w-5xl overflow-auto rounded-[32px] bg-white p-5 shadow-2xl md:p-8">
              <div class="mb-6 flex items-center justify-between gap-3 border-b border-slate-200 pb-4">
                <div>
                  <p class="text-sm font-medium text-blue-600">${data.labels.pdfPreview}</p>
                  <h3 class="mt-1 text-2xl font-semibold text-slate-900">${data.labels.pdfSample}</h3>
                </div>
                <div class="flex gap-2">
                  <button
                    onclick="downloadPdf()"
                    class="rounded-full bg-[linear-gradient(90deg,#3b82f6,#69a4ff)] px-4 py-2 text-sm font-medium text-white"
                  >
                    PDF 다운로드
                  </button>
                  <button
                    onclick="closePdfPreview()"
                    class="rounded-full border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700"
                  >
                    ${data.labels.close}
                  </button>
                </div>
              </div>

              <div id="pdf-content" class="pdf-root mx-auto max-w-3xl rounded-[28px] border border-slate-200 bg-white p-8 shadow-[0_12px_40px_rgba(15,23,42,0.08)]">
                <div class="border-b border-slate-200 pb-6">
                  <p class="text-sm font-medium tracking-[0.16em] text-slate-500">DOZN INTERVIEW GUIDE</p>
                  <h4 class="mt-3 text-3xl font-semibold text-slate-900">${selected.name} 면접 결과</h4>
                  <div class="mt-4 grid gap-3 text-sm text-slate-600 md:grid-cols-3">
                    <div>
                      <p class="font-semibold text-slate-900">${data.labels.candidateName}</p>
                      <p>${escapeHtml(form.candidateName || selected.pdfPreview?.candidateName || "-")}</p>
                    </div>
                    <div>
                      <p class="font-semibold text-slate-900">${data.labels.interviewer}</p>
                      <p>${escapeHtml(form.interviewer || selected.pdfPreview?.interviewers || "-")}</p>
                    </div>
                    <div>
                      <p class="font-semibold text-slate-900">${data.labels.interviewDate}</p>
                      <p>${escapeHtml(form.interviewDate || selected.pdfPreview?.interviewDate || "-")}</p>
                    </div>
                  </div>
                </div>

                <div class="mt-6 space-y-5">
                  ${competencies
                    .map(
                      (item) => `
                    <div class="pdf-break-avoid rounded-3xl border border-slate-200 p-5">
                      <div class="mb-3 flex items-center justify-between gap-3">
                        <div>
                          <p class="text-sm font-medium text-blue-600">${item.order}</p>
                          <p class="text-xl font-semibold text-slate-900">${item.name}</p>
                        </div>
                        <div class="rounded-full bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700">
                          ${getQuestionScore(item.id, 0) || "-"} / 5점
                        </div>
                      </div>

                      ${item.questions
                        .map((q, qIndex) => {
                          const memo = getQuestionMemo(item.id, qIndex);
                          const score = getQuestionScore(item.id, qIndex);
                          return `
                            <div class="mt-4 rounded-2xl bg-slate-50 p-4">
                              <p class="text-sm font-semibold text-slate-900">${data.labels.mainQuestion}</p>
                              <p class="mt-2 text-sm leading-6 text-slate-700">${escapeHtml(q.main)}</p>
                              <div class="mt-3 text-sm text-slate-600">
                                <span class="font-semibold text-slate-900">점수</span> : ${score || "-"} / 5
                              </div>
                              <div class="mt-3">
                                <p class="text-sm font-semibold text-slate-900">${data.labels.memoSummary}</p>
                                <p class="mt-2 text-sm leading-6 text-slate-700">${memo ? nl2br(memo) : "작성된 메모 없음"}</p>
                              </div>
                            </div>
                          `;
                        })
                        .join("")}
                    </div>
                  `
                    )
                    .join("")}
                </div>

                <div class="mt-6 grid gap-5 lg:grid-cols-2">
                  <div class="rounded-3xl border border-slate-200 p-5">
                    <p class="text-lg font-semibold text-slate-900">${data.labels.overallCommentTitle}</p>
                    <p class="mt-3 text-sm leading-7 text-slate-700">
                      ${form.overallComment ? nl2br(form.overallComment) : escapeHtml(selected.pdfPreview?.overallComment || "작성된 종합 의견 없음")}
                    </p>
                  </div>
                  <div class="rounded-3xl border border-slate-200 p-5">
                    <p class="text-lg font-semibold text-slate-900">${data.labels.followUpTitle}</p>
                    <div class="mt-3 text-sm leading-7 text-slate-700">
                      ${
                        form.followUpCheck
                          ? nl2br(form.followUpCheck)
                          : (selected.pdfPreview?.followUps?.length
                              ? selected.pdfPreview.followUps.map((item) => `• ${escapeHtml(item)}`).join("<br>")
                              : "작성된 추가 확인사항 없음")
                      }
                    </div>
                  </div>
                </div>

                <div class="mt-6 rounded-3xl bg-slate-900 px-6 py-5 text-white">
                  <p class="text-sm font-medium text-slate-300">${data.labels.finalReview}</p>
                  <div class="mt-3 flex flex-wrap items-center justify-between gap-3">
                    <p class="text-2xl font-semibold">${escapeHtml(currentFinalDecision)}</p>
                    <p class="text-sm leading-6 text-slate-300">${data.pdfFooterNote}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function downloadPdf() {
        const selected = getSelectedPosition();
        const form = getFormState();
        const element = document.getElementById("pdf-content");
        if (!element) return;

        const fileName = `${selected.name}_${form.candidateName || "면접결과"}.pdf`;

        const opt = {
          margin: [10, 10, 10, 10],
          filename: fileName,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: {
            scale: 2,
            useCORS: true,
            scrollY: 0,
          },
          jsPDF: {
            unit: "mm",
            format: "a4",
            orientation: "portrait",
          },
          pagebreak: {
            mode: ["css", "legacy"],
          },
        };

        html2pdf().set(opt).from(element).save();
      }

      function render() {
        app.innerHTML = `
          ${currentPage === "landing" ? renderLanding() : renderGuide()}
          ${renderCautionModal()}
          ${renderPdfPreview()}
        `;
      }

      window.setSelectedPosition = setSelectedPosition;
      window.startGuide = startGuide;
      window.goLanding = goLanding;
      window.scrollToSection = scrollToSection;
      window.openPdfPreview = openPdfPreview;
      window.closePdfPreview = closePdfPreview;
      window.openCautionModal = openCautionModal;
      window.closeCautionModal = closeCautionModal;
      window.setQuestionScore = setQuestionScore;
      window.setQuestionMemo = setQuestionMemo;
      window.updateFormField = updateFormField;
      window.setFinalDecision = setFinalDecision;
      window.downloadPdf = downloadPdf;

      render();
    </script>
  </body>
</html>
