<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>역량 기반 면접 가이드</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen">
  <div class="max-w-5xl mx-auto py-8 px-4">
    <header class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900 mb-2">역량 기반 면접 가이드</h1>
      <p class="text-sm text-slate-600">
        직무와 역량을 선택하면 해당 역량을 검증하기 위한 질문, 꼬리질문, 관찰 포인트 등을 자동으로 보여줍니다.
      </p>
    </header>

    <!-- 후보자/면접 정보 -->
    <section class="mb-6 grid gap-4 md:grid-cols-2">
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">🧑‍💼 후보자 정보</h2>
        <div class="grid gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">후보자명</label>
            <input id="candidateName" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
                   placeholder="예: 홍길동" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">지원 포지션/메모(선택)</label>
            <input id="candidateMeta" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
                   placeholder="예: 포지션 및 참고사항 등" />
          </div>
        </div>
      </div>

      <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
        <h2 class="text-sm font-semibold text-slate-900 mb-3">🧑‍⚖️ 면접관 정보</h2>
        <div class="grid gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">면접관명</label>
            <input id="interviewerName" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
                   placeholder="예: 김더즌" />
          </div>
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">면접일</label>
            <input id="interviewDate" type="date"
                   class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm" />
          </div>
        </div>
      </div>
    </section>

    <!-- 입력란 묶음: 역량평가 + 최종 총평 -->
    <section class="mb-6 grid gap-4 md:grid-cols-2">
      <!-- 역량평가 -->
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <h2 class="text-sm font-semibold text-slate-900">⭐ 역량 평가</h2>
            <p class="text-xs text-slate-500">상단 칸반 안에서 역량을 바꿔가며 평가를 이어서 작성할 수 있습니다.</p>
          </div>
        </div>

        <div class="mt-3 grid gap-3">
          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">평가 역량 선택</label>
            <div class="flex items-center gap-2">
              <button id="evalPrevBtn"
                class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-300 bg-white text-sm shadow-sm hover:bg-slate-50"
                type="button">
                ◀
              </button>

              <select id="evalCompetencySelect" class="flex-1 rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"></select>

              <button id="evalNextBtn"
                class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-300 bg-white text-sm shadow-sm hover:bg-slate-50"
                type="button">
                ▶
              </button>
            </div>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">평가 점수</label>
            <select id="scoreSelect" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm">
              <option value="">선택</option>
              <option value="1">부족함</option>
              <option value="2">개선필요</option>
              <option value="3">기대충족</option>
              <option value="4">기대초과</option>
              <option value="5">탁월</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-medium text-slate-700 mb-1">면접관 메모</label>
            <textarea id="memoInput" rows="7"
              class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
              placeholder="관찰한 근거/사례/우려 포인트를 적어두면 평가 합의가 쉬워져요."></textarea>
          </div>
        </div>
      </div>

      <!-- 최종 총평 -->
      <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
        <div class="flex items-start justify-between gap-3 flex-wrap">
          <div>
            <h2 class="text-sm font-semibold text-slate-900">🧾 최종 총평</h2>
            <p class="text-xs text-slate-500">후보자 전체에 대한 최종 의견과 판정을 남깁니다.</p>
          </div>
          <div class="flex items-center gap-2">
            <span class="text-xs text-slate-600">최종 판정</span>
            <select id="finalDecision" class="rounded-lg border border-slate-300 bg-white px-2 py-1 text-sm">
              <option value="">선택</option>
              <option value="추천">추천</option>
              <option value="보류">보류</option>
              <option value="비추천">비추천</option>
            </select>
          </div>
        </div>

        <div class="mt-3">
          <label class="block text-xs font-medium text-slate-700 mb-1">최종 총평 메모</label>
          <textarea id="finalComment" rows="10"
            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
            placeholder="후보자 전체 강점/우려점/추가 확인 필요사항 등을 적어주세요."></textarea>
        </div>
      </div>
    </section>

    <!-- 저장/기록/내보내기 버튼 -->
    <section class="mb-6 flex flex-wrap gap-3">
      <button id="saveSessionBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-slate-900 text-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-800">
        💾 면접 결과 저장
      </button>

      <button id="openHistoryBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-50">
        🗂️ 저장 기록 보기
      </button>

      <button id="exportExcelBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-50">
        ⬇️ 면접 결과 내보내기(엑셀)
      </button>

      <button id="exportPdfBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-50">
        🖨️ 면접 결과 저장(PDF)
      </button>
    </section>

    <!-- 직무/역량 선택 (질문 보기용) -->
    <section class="mb-6 grid gap-4 md:grid-cols-2">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">직무 선택</label>
        <select id="roleSelect" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"></select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">역량 선택 (질문 보기용)</label>
        <select id="competencySelect" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"></select>
      </div>
    </section>

    <!-- 질문 이동/행동지표 -->
    <section class="mb-6 flex flex-wrap gap-3">
      <button id="prevQuestionBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-50">
        ⬅️ 이전 질문
      </button>

      <button id="nextQuestionBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-50">
        ➡️ 다음 질문
      </button>

      <button id="behaviorBtn"
        class="inline-flex items-center rounded-xl border border-slate-300 bg-white px-3 py-2 text-xs font-medium shadow-sm hover:bg-slate-50">
        📋 이 역량의 행동지표 보기
      </button>
    </section>

    <section id="contentArea" class="space-y-4"></section>
  </div>

  <!-- 행동지표 모달 -->
  <div id="behaviorModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl max-w-lg w-full p-5 shadow-xl border border-slate-200">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-slate-900">이 역량의 행동지표</h2>
        <button id="closeBehaviorModal" class="text-slate-500 hover:text-slate-800 text-sm">✕</button>
      </div>
      <div id="behaviorModalContent" class="text-sm text-slate-800 space-y-2"></div>
    </div>
  </div>

  <!-- 기록 모달 -->
  <div id="historyModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl max-w-4xl w-full p-5 shadow-xl border border-slate-200">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-semibold text-slate-900">저장된 평가 기록</h2>
        <div class="flex items-center gap-2">
          <button id="clearRecordsBtn" class="text-xs px-3 py-2 rounded-xl border border-slate-300 hover:bg-slate-50">
            🧹 전체 삭제
          </button>
          <button id="closeHistoryModal" class="text-slate-500 hover:text-slate-800 text-sm">✕</button>
        </div>
      </div>

      <div class="grid gap-3 md:grid-cols-3 mb-3">
        <div class="md:col-span-2">
          <input id="historySearch" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm"
                 placeholder="검색: 후보자명/면접관/직무/역량 등" />
        </div>
        <div>
          <select id="historySort" class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
          </select>
        </div>
      </div>

      <div id="historyList" class="max-h-[60vh] overflow-auto border border-slate-200 rounded-xl"></div>
    </div>
  </div>

  <script src="interview-data.js"></script>

  <script>
    const roleSelect = document.getElementById("roleSelect");
    const competencySelect = document.getElementById("competencySelect");
    const contentArea = document.getElementById("contentArea");

    const evalCompetencySelect = document.getElementById("evalCompetencySelect");
    const evalPrevBtn = document.getElementById("evalPrevBtn");
    const evalNextBtn = document.getElementById("evalNextBtn");

    const prevQuestionBtn = document.getElementById("prevQuestionBtn");
    const nextQuestionBtn = document.getElementById("nextQuestionBtn");
    const behaviorBtn = document.getElementById("behaviorBtn");
    const saveSessionBtn = document.getElementById("saveSessionBtn");
    const openHistoryBtn = document.getElementById("openHistoryBtn");
    const exportExcelBtn = document.getElementById("exportExcelBtn");
    const exportPdfBtn = document.getElementById("exportPdfBtn");

    const candidateName = document.getElementById("candidateName");
    const candidateMeta = document.getElementById("candidateMeta");
    const interviewerName = document.getElementById("interviewerName");
    const interviewDate = document.getElementById("interviewDate");
    const scoreSelect = document.getElementById("scoreSelect");
    const memoInput = document.getElementById("memoInput");
    const finalDecision = document.getElementById("finalDecision");
    const finalComment = document.getElementById("finalComment");

    const behaviorModal = document.getElementById("behaviorModal");
    const behaviorModalContent = document.getElementById("behaviorModalContent");
    const closeBehaviorModal = document.getElementById("closeBehaviorModal");

    const historyModal = document.getElementById("historyModal");
    const closeHistoryModal = document.getElementById("closeHistoryModal");
    const historyList = document.getElementById("historyList");
    const historySearch = document.getElementById("historySearch");
    const historySort = document.getElementById("historySort");
    const clearRecordsBtn = document.getElementById("clearRecordsBtn");

    let currentQuestionIndex = 0;
    let currentEvalCompetency = "";
    let draftEvaluations = {};

    const LS_KEY_SESSIONS = "dozn_interview_sessions_v5";
    const LS_KEY_DRAFT = "dozn_interview_draft_v5";

    function todayISO() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, "0");
      const dd = String(d.getDate()).padStart(2, "0");
      return `${yyyy}-${mm}-${dd}`;
    }

    function safeText(v) {
      return (v ?? "").toString().trim();
    }

    function escapeHtml(str) {
      return safeText(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function scoreLabel(score) {
      const map = {
        1: "부족함",
        2: "개선필요",
        3: "기대충족",
        4: "기대초과",
        5: "탁월"
      };
      return map[Number(score)] || "-";
    }

    function getRoleCompetencies(role) {
      return Object.keys(window.interviewData?.[role]?.competencies || {});
    }

    function getQuestionContext() {
      const role = roleSelect.value;
      const comp = competencySelect.value;
      const compData = window.interviewData?.[role]?.competencies?.[comp];
      const sets = compData?.questionSets || [];
      const qSet = sets[currentQuestionIndex] || null;
      return { role, comp, compData, sets, qSet };
    }

    function getDraftKey(role, comp) {
      return `${role}__${comp}`;
    }

    function getSessionKey() {
      return [
        safeText(candidateName.value),
        safeText(candidateMeta.value),
        safeText(interviewerName.value),
        safeText(interviewDate.value),
        safeText(roleSelect.value)
      ].join("||");
    }

    function loadSessions() {
      try {
        const raw = localStorage.getItem(LS_KEY_SESSIONS);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSessions(sessions) {
      localStorage.setItem(LS_KEY_SESSIONS, JSON.stringify(sessions));
    }

    function findCurrentSession() {
      const sessions = loadSessions();
      const key = getSessionKey();
      return sessions.find(s => s.sessionKey === key);
    }

    function loadDraft() {
      try {
        const raw = localStorage.getItem(LS_KEY_DRAFT);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    }

    function saveDraft() {
      saveCurrentEvaluationDraft();

      const draft = {
        candidateName: safeText(candidateName.value),
        candidateMeta: safeText(candidateMeta.value),
        interviewerName: safeText(interviewerName.value),
        interviewDate: safeText(interviewDate.value),
        role: safeText(roleSelect.value),
        questionCompetency: safeText(competencySelect.value),
        evalCompetency: safeText(currentEvalCompetency),
        finalDecision: safeText(finalDecision.value),
        finalComment: safeText(finalComment.value),
        currentQuestionIndex,
        draftEvaluations
      };
      localStorage.setItem(LS_KEY_DRAFT, JSON.stringify(draft));
    }

    function initRoleOptions() {
      roleSelect.innerHTML = "";
      const roles = Object.keys(window.interviewData || {});
      roles.forEach((role) => {
        const opt = document.createElement("option");
        opt.value = role;
        opt.textContent = role;
        roleSelect.appendChild(opt);
      });
    }

    function updateQuestionCompetencyOptions(preferred = "") {
      const role = roleSelect.value;
      const list = getRoleCompetencies(role);

      competencySelect.innerHTML = "";
      list.forEach((comp) => {
        const opt = document.createElement("option");
        opt.value = comp;
        opt.textContent = comp;
        competencySelect.appendChild(opt);
      });

      if (preferred && list.includes(preferred)) {
        competencySelect.value = preferred;
      } else if (list.length) {
        competencySelect.value = list[0];
      }
    }

    function updateEvalCompetencyOptions(preferred = "") {
      const role = roleSelect.value;
      const list = getRoleCompetencies(role);

      evalCompetencySelect.innerHTML = "";
      list.forEach((comp) => {
        const opt = document.createElement("option");
        opt.value = comp;
        opt.textContent = comp;
        evalCompetencySelect.appendChild(opt);
      });

      if (preferred && list.includes(preferred)) {
        currentEvalCompetency = preferred;
      } else if (currentEvalCompetency && list.includes(currentEvalCompetency)) {
        // keep
      } else {
        currentEvalCompetency = list[0] || "";
      }

      if (currentEvalCompetency) {
        evalCompetencySelect.value = currentEvalCompetency;
      }
      updateEvalNavButtons();
    }

    function updateEvalNavButtons() {
      const list = getRoleCompetencies(roleSelect.value);
      const idx = list.indexOf(currentEvalCompetency);

      evalPrevBtn.disabled = idx <= 0;
      evalNextBtn.disabled = idx < 0 || idx === list.length - 1;

      evalPrevBtn.classList.toggle("opacity-50", evalPrevBtn.disabled);
      evalNextBtn.classList.toggle("opacity-50", evalNextBtn.disabled);
    }

    function validateQuestionIndex() {
      const { sets } = getQuestionContext();
      if (!sets.length) {
        currentQuestionIndex = 0;
        return;
      }
      if (currentQuestionIndex < 0) currentQuestionIndex = 0;
      if (currentQuestionIndex > sets.length - 1) currentQuestionIndex = sets.length - 1;
    }

    function hydrateDraftFromSavedSessionIfNeeded() {
      const session = findCurrentSession();
      if (!session) return;

      if (!safeText(finalDecision.value)) finalDecision.value = session.finalDecision || "";
      if (!safeText(finalComment.value)) finalComment.value = session.finalComment || "";

      (session.evaluations || []).forEach((ev) => {
        const key = getDraftKey(ev.role, ev.competency);
        if (!draftEvaluations[key]) {
          draftEvaluations[key] = {
            role: ev.role,
            competency: ev.competency,
            score: ev.score ? String(ev.score) : "",
            memo: ev.memo || "",
            updatedAt: ev.updatedAt || session.updatedAt || session.createdAt
          };
        }
      });
    }

    function saveCurrentEvaluationDraft() {
      const role = roleSelect.value;
      const comp = currentEvalCompetency;
      if (!role || !comp) return;

      const key = getDraftKey(role, comp);
      draftEvaluations[key] = {
        role,
        competency: comp,
        score: safeText(scoreSelect.value),
        memo: safeText(memoInput.value),
        updatedAt: new Date().toISOString()
      };
    }

    function loadEvaluationDraftToForm() {
      const role = roleSelect.value;
      const comp = currentEvalCompetency;
      if (!role || !comp) {
        scoreSelect.value = "";
        memoInput.value = "";
        return;
      }

      hydrateDraftFromSavedSessionIfNeeded();

      const key = getDraftKey(role, comp);
      const draft = draftEvaluations[key];

      scoreSelect.value = draft?.score || "";
      memoInput.value = draft?.memo || "";
      evalCompetencySelect.value = comp;
      updateEvalNavButtons();
    }

    function moveEvalCompetency(direction) {
      saveCurrentEvaluationDraft();

      const list = getRoleCompetencies(roleSelect.value);
      const idx = list.indexOf(currentEvalCompetency);
      if (idx < 0) return;

      const nextIdx = idx + direction;
      if (nextIdx < 0 || nextIdx >= list.length) return;

      currentEvalCompetency = list[nextIdx];
      evalCompetencySelect.value = currentEvalCompetency;
      loadEvaluationDraftToForm();
      saveDraft();
    }

    function renderContent() {
      validateQuestionIndex();
      const { role, comp, compData, sets } = getQuestionContext();
      const qSet = sets[currentQuestionIndex];

      if (!role || !comp || !compData || !qSet) {
        contentArea.innerHTML = `
          <div class="rounded-2xl bg-white p-6 shadow-sm border border-slate-200 text-sm text-slate-600">
            표시할 면접 질문 데이터가 없습니다.<br />
            interview-data.js 파일에 직무/역량 데이터가 정상적으로 들어있는지 확인해주세요.
          </div>
        `;
        return;
      }

      contentArea.innerHTML = `
        <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
          <h2 class="text-lg font-semibold text-slate-900 mb-1">[${escapeHtml(role)}] ${escapeHtml(comp)}</h2>
          <p class="text-sm text-slate-700 mb-2">${escapeHtml(compData.definition || "")}</p>
          <p class="text-xs text-slate-500">질문 세트: ${currentQuestionIndex + 1} / ${sets.length}</p>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
          <h3 class="text-sm font-semibold text-slate-900 mb-2">✅ 메인 질문</h3>
          <p class="text-sm text-slate-800">${escapeHtml(qSet.mainQuestion || "")}</p>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
          <h3 class="text-sm font-semibold text-slate-900 mb-2">🔎 꼬리질문 (더 깊이 파고들 때)</h3>
          <ul class="list-disc pl-5 space-y-1 text-sm text-slate-800">
            ${(qSet.followUps || []).map(q => `<li>${escapeHtml(q)}</li>`).join("")}
          </ul>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
          <h3 class="text-sm font-semibold text-slate-900 mb-2">👀 관찰 포인트</h3>
          <ul class="list-disc pl-5 space-y-1 text-sm text-slate-800">
            ${(qSet.observationPoints || []).map(t => `<li>${escapeHtml(t)}</li>`).join("")}
          </ul>
        </div>

        <div class="grid gap-4 md:grid-cols-2">
          <div class="rounded-2xl bg-emerald-50 p-4 border border-emerald-200">
            <h3 class="text-sm font-semibold text-emerald-900 mb-2">💚 긍정 신호</h3>
            <ul class="list-disc pl-5 space-y-1 text-sm text-emerald-900">
              ${(qSet.positiveSignals || []).map(t => `<li>${escapeHtml(t)}</li>`).join("")}
            </ul>
          </div>

          <div class="rounded-2xl bg-rose-50 p-4 border border-rose-200">
            <h3 class="text-sm font-semibold text-rose-900 mb-2">⚠️ 우려 신호</h3>
            <ul class="list-disc pl-5 space-y-1 text-sm text-rose-900">
              ${(qSet.negativeSignals || []).map(t => `<li>${escapeHtml(t)}</li>`).join("")}
            </ul>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow-sm border border-slate-200">
          <h3 class="text-sm font-semibold text-slate-900 mb-2">📊 레벨 구분 기준 (주니어 vs 시니어)</h3>
          <div class="grid gap-4 md:grid-cols-2 text-sm text-slate-800">
            <div>
              <div class="font-semibold mb-1">주니어 기대 행동</div>
              <p>${escapeHtml(compData.levelCriteria?.junior || "-")}</p>
            </div>
            <div>
              <div class="font-semibold mb-1">시니어 기대 행동</div>
              <p>${escapeHtml(compData.levelCriteria?.senior || "-")}</p>
            </div>
          </div>
        </div>
      `;

      prevQuestionBtn.disabled = currentQuestionIndex === 0;
      nextQuestionBtn.disabled = currentQuestionIndex === sets.length - 1;
      prevQuestionBtn.classList.toggle("opacity-50", prevQuestionBtn.disabled);
      nextQuestionBtn.classList.toggle("opacity-50", nextQuestionBtn.disabled);
    }

    function openBehaviorModal() {
      const { comp, compData } = getQuestionContext();
      if (!comp || !compData?.behaviorIndicators) {
        alert("이 역량의 행동지표 정보가 아직 없습니다.");
        return;
      }

      const bi = compData.behaviorIndicators;
      behaviorModalContent.innerHTML = `
        <p class="font-semibold mb-1">${escapeHtml(comp)}</p>
        <p class="text-slate-700 mb-2"><span class="font-semibold">정의 :</span> ${escapeHtml(bi.definition || "")}</p>
        <ul class="list-disc pl-5 space-y-1">
          ${(bi.items || []).map(item => `<li>${escapeHtml(item)}</li>`).join("")}
        </ul>
      `;

      behaviorModal.classList.remove("hidden");
      behaviorModal.classList.add("flex");
    }

    function closeBehavior() {
      behaviorModal.classList.add("hidden");
      behaviorModal.classList.remove("flex");
    }

    function buildEvaluationsForSave() {
      saveCurrentEvaluationDraft();

      const role = roleSelect.value;
      const rows = Object.values(draftEvaluations)
        .filter(ev => ev.role === role)
        .filter(ev => safeText(ev.score) || safeText(ev.memo))
        .map(ev => ({
          role: ev.role,
          competency: ev.competency,
          score: ev.score ? Number(ev.score) : null,
          memo: ev.memo || "",
          updatedAt: ev.updatedAt || new Date().toISOString()
        }));

      const roleComps = getRoleCompetencies(role);
      rows.sort((a, b) => roleComps.indexOf(a.competency) - roleComps.indexOf(b.competency));

      return rows;
    }

    function saveInterviewSession() {
      if (!safeText(candidateName.value)) {
        alert("후보자명을 입력해주세요.");
        return;
      }
      if (!safeText(interviewerName.value)) {
        alert("면접관명을 입력해주세요.");
        return;
      }
      if (!safeText(interviewDate.value)) {
        alert("면접일을 선택해주세요.");
        return;
      }
      if (!safeText(roleSelect.value)) {
        alert("직무를 선택해주세요.");
        return;
      }

      const evaluations = buildEvaluationsForSave();
      if (!evaluations.length) {
        alert("저장할 역량 평가가 없습니다. 상단 역량 평가 칸반에 점수 또는 메모를 입력해주세요.");
        return;
      }

      const sessions = loadSessions();
      const key = getSessionKey();

      let session = sessions.find(s => s.sessionKey === key);
      if (!session) {
        session = {
          id: crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2),
          sessionKey: key,
          createdAt: new Date().toISOString()
        };
        sessions.push(session);
      }

      session.updatedAt = new Date().toISOString();
      session.candidate = {
        name: safeText(candidateName.value),
        meta: safeText(candidateMeta.value)
      };
      session.interviewer = safeText(interviewerName.value);
      session.date = safeText(interviewDate.value);
      session.role = safeText(roleSelect.value);
      session.finalDecision = safeText(finalDecision.value);
      session.finalComment = safeText(finalComment.value);
      session.evaluations = evaluations;

      saveSessions(sessions);
      saveDraft();
      alert("✅ 면접 결과가 저장되었습니다.");
    }

    function renderHistory() {
      const q = safeText(historySearch.value).toLowerCase();
      const sort = historySort.value;

      let sessions = loadSessions();

      sessions = sessions.filter(s => {
        const evaluationBlob = (s.evaluations || [])
          .map(ev => [ev.role, ev.competency, ev.memo, ev.score].join(" "))
          .join(" ");

        const blob = [
          s?.candidate?.name,
          s?.candidate?.meta,
          s?.interviewer,
          s?.role,
          s?.date,
          s?.finalDecision,
          s?.finalComment,
          evaluationBlob
        ].join(" ").toLowerCase();

        return blob.includes(q);
      });

      sessions.sort((a, b) => {
        const ta = new Date(a.updatedAt || a.createdAt).getTime();
        const tb = new Date(b.updatedAt || b.createdAt).getTime();
        return sort === "oldest" ? ta - tb : tb - ta;
      });

      if (!sessions.length) {
        historyList.innerHTML = `<div class="p-4 text-sm text-slate-600">저장된 기록이 없습니다.</div>`;
        return;
      }

      historyList.innerHTML = sessions.map(s => `
        <details class="border-b border-slate-200 p-4">
          <summary class="cursor-pointer">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="text-sm font-semibold text-slate-900">${escapeHtml(s.candidate?.name || "-")} · ${escapeHtml(s.role || "-")}</div>
                <div class="text-xs text-slate-600 mt-1">
                  ${escapeHtml(s.date || "-")} · 면접관: ${escapeHtml(s.interviewer || "-")} · 평가 역량 수: ${(s.evaluations || []).length}
                </div>
              </div>
              <div class="text-xs text-slate-500">${escapeHtml(s.finalDecision || "-")}</div>
            </div>
          </summary>

          <div class="mt-3 grid gap-3">
            <div class="rounded-xl bg-slate-50 border border-slate-200 p-3">
              <div class="text-xs font-semibold text-slate-700 mb-1">🧾 최종 총평</div>
              <div class="text-sm text-slate-800"><strong>최종 판정:</strong> ${escapeHtml(s.finalDecision || "-")}</div>
              <div class="text-sm text-slate-800 whitespace-pre-wrap mt-2">${escapeHtml(s.finalComment || "(총평 없음)")}</div>
            </div>

            ${(s.evaluations || []).map(ev => `
              <div class="rounded-xl bg-white border border-slate-200 p-3">
                <div class="text-sm font-semibold text-slate-900">${escapeHtml(ev.competency)}</div>
                <div class="text-xs text-slate-600 mt-1">점수: ${scoreLabel(ev.score)}</div>
                <div class="text-xs text-slate-700 mt-2 font-medium">메모</div>
                <div class="text-sm text-slate-800 whitespace-pre-wrap">${escapeHtml(ev.memo || "(메모 없음)")}</div>
              </div>
            `).join("")}
          </div>
        </details>
      `).join("");
    }

    function openHistory() {
      renderHistory();
      historyModal.classList.remove("hidden");
      historyModal.classList.add("flex");
    }

    function closeHistory() {
      historyModal.classList.add("hidden");
      historyModal.classList.remove("flex");
    }

    function clearAllRecords() {
      const ok = confirm("저장된 모든 면접 세션 기록을 삭제할까요?");
      if (!ok) return;
      localStorage.removeItem(LS_KEY_SESSIONS);
      renderHistory();
    }

    function exportCurrentSessionToExcel() {
      const session = findCurrentSession();
      if (!session) {
        alert("현재 후보자 기준 저장된 세션이 없습니다. 먼저 면접 결과를 저장해주세요.");
        return;
      }

      if (typeof XLSX === "undefined") {
        alert("엑셀 라이브러리가 로드되지 않았습니다.");
        return;
      }

      const summaryRows = [
        { 항목: "후보자명", 값: session.candidate?.name || "" },
        { 항목: "지원 포지션/메모", 값: session.candidate?.meta || "" },
        { 항목: "면접관", 값: session.interviewer || "" },
        { 항목: "면접일", 값: session.date || "" },
        { 항목: "직무", 값: session.role || "" },
        { 항목: "최종 판정", 값: session.finalDecision || "" },
        { 항목: "최종 총평", 값: session.finalComment || "" }
      ];

      const evaluationRows = (session.evaluations || []).map((ev, idx) => ({
        순번: idx + 1,
        직무: ev.role || "",
        역량: ev.competency || "",
        평가점수: scoreLabel(ev.score),
        메모: ev.memo || "",
        수정시각: ev.updatedAt ? new Date(ev.updatedAt).toLocaleString() : ""
      }));

      const wb = XLSX.utils.book_new();

      const ws1 = XLSX.utils.json_to_sheet(summaryRows);
      ws1["!cols"] = [{ wch: 18 }, { wch: 80 }];
      XLSX.utils.book_append_sheet(wb, ws1, "면접요약");

      const ws2 = XLSX.utils.json_to_sheet(evaluationRows);
      ws2["!cols"] = [
        { wch: 6 }, { wch: 14 }, { wch: 16 }, { wch: 14 },
        { wch: 50 }, { wch: 20 }
      ];
      XLSX.utils.book_append_sheet(wb, ws2, "역량평가");

      XLSX.writeFile(
        wb,
        `interview_session_${safeText(session.candidate?.name || "candidate")}_${session.date || todayISO()}.xlsx`
      );
    }

    function exportCurrentSessionToPdf() {
      const session = findCurrentSession();
      if (!session) {
        alert("현재 후보자 기준 저장된 세션이 없습니다. 먼저 면접 결과를 저장해주세요.");
        return;
      }

      const evaluationCards = (session.evaluations || []).map((ev, idx) => `
        <div class="card">
          <h3>${idx + 1}. ${escapeHtml(ev.competency)}</h3>
          <p><strong>직무:</strong> ${escapeHtml(ev.role)}</p>
          <p><strong>점수:</strong> ${escapeHtml(scoreLabel(ev.score))}</p>
          <p><strong>메모:</strong><br>${escapeHtml(ev.memo || "(메모 없음)").replace(/\n/g, "<br>")}</p>
        </div>
      `).join("");

      const printWindow = window.open("", "_blank", "width=900,height=1000");
      printWindow.document.write(`
        <html>
          <head>
            <title>면접 평가 결과</title>
            <style>
              body { font-family: Arial, sans-serif; padding: 32px; color: #0f172a; }
              h1 { font-size: 24px; margin-bottom: 8px; }
              h2 { font-size: 16px; margin-bottom: 20px; color: #475569; }
              .meta { margin-bottom: 24px; line-height: 1.7; }
              .section-title { font-size: 18px; margin: 24px 0 12px; }
              .summary-box, .card {
                border: 1px solid #cbd5e1;
                border-radius: 12px;
                padding: 16px;
                margin-bottom: 16px;
                page-break-inside: avoid;
              }
              .card h3 { margin: 0 0 10px 0; font-size: 18px; }
              p { margin: 6px 0; line-height: 1.6; }
            </style>
          </head>
          <body>
            <h1>역량 기반 면접 평가 결과</h1>
            <h2>${escapeHtml(session.candidate?.name || "-")}</h2>

            <div class="meta">
              <div><strong>지원 포지션/메모:</strong> ${escapeHtml(session.candidate?.meta || "-")}</div>
              <div><strong>면접관:</strong> ${escapeHtml(session.interviewer || "-")}</div>
              <div><strong>면접일:</strong> ${escapeHtml(session.date || "-")}</div>
              <div><strong>직무:</strong> ${escapeHtml(session.role || "-")}</div>
            </div>

            <div class="section-title">최종 총평</div>
            <div class="summary-box">
              <p><strong>최종 판정:</strong> ${escapeHtml(session.finalDecision || "-")}</p>
              <p><strong>총평:</strong><br>${escapeHtml(session.finalComment || "(총평 없음)").replace(/\n/g, "<br>")}</p>
            </div>

            <div class="section-title">역량별 평가</div>
            ${evaluationCards}
          </body>
        </html>
      `);
      printWindow.document.close();
      printWindow.focus();
      printWindow.print();
    }

    function goPrevQuestion() {
      const { sets } = getQuestionContext();
      if (!sets.length) return;
      if (currentQuestionIndex > 0) {
        currentQuestionIndex -= 1;
        renderContent();
        saveDraft();
      }
    }

    function goNextQuestion() {
      const { sets } = getQuestionContext();
      if (!sets.length) return;
      if (currentQuestionIndex < sets.length - 1) {
        currentQuestionIndex += 1;
        renderContent();
        saveDraft();
      }
    }

    roleSelect.addEventListener("change", () => {
      saveCurrentEvaluationDraft();

      const prevQuestionComp = competencySelect.value;
      updateQuestionCompetencyOptions(prevQuestionComp);

      const prevEvalComp = currentEvalCompetency;
      updateEvalCompetencyOptions(prevEvalComp);
      loadEvaluationDraftToForm();

      currentQuestionIndex = 0;
      renderContent();
      saveDraft();
    });

    competencySelect.addEventListener("change", () => {
      currentQuestionIndex = 0;
      renderContent();
      saveDraft();
    });

    evalCompetencySelect.addEventListener("change", () => {
      saveCurrentEvaluationDraft();
      currentEvalCompetency = evalCompetencySelect.value;
      loadEvaluationDraftToForm();
      saveDraft();
    });

    evalPrevBtn.addEventListener("click", () => moveEvalCompetency(-1));
    evalNextBtn.addEventListener("click", () => moveEvalCompetency(1));

    prevQuestionBtn.addEventListener("click", goPrevQuestion);
    nextQuestionBtn.addEventListener("click", goNextQuestion);
    behaviorBtn.addEventListener("click", openBehaviorModal);
    saveSessionBtn.addEventListener("click", saveInterviewSession);
    openHistoryBtn.addEventListener("click", openHistory);
    exportExcelBtn.addEventListener("click", exportCurrentSessionToExcel);
    exportPdfBtn.addEventListener("click", exportCurrentSessionToPdf);

    closeBehaviorModal.addEventListener("click", closeBehavior);
    behaviorModal.addEventListener("click", (e) => {
      if (e.target === behaviorModal) closeBehavior();
    });

    closeHistoryModal.addEventListener("click", closeHistory);
    historyModal.addEventListener("click", (e) => {
      if (e.target === historyModal) closeHistory();
    });

    historySearch.addEventListener("input", renderHistory);
    historySort.addEventListener("change", renderHistory);
    clearRecordsBtn.addEventListener("click", clearAllRecords);

    [candidateName, candidateMeta, interviewerName, interviewDate, finalDecision, finalComment].forEach((el) => {
      el.addEventListener("input", saveDraft);
      el.addEventListener("change", saveDraft);
    });

    [scoreSelect, memoInput].forEach((el) => {
      el.addEventListener("input", () => {
        saveCurrentEvaluationDraft();
        saveDraft();
      });
      el.addEventListener("change", () => {
        saveCurrentEvaluationDraft();
        saveDraft();
      });
    });

    if (!interviewDate.value) {
      interviewDate.value = todayISO();
    }

    const draft = loadDraft();

    if (draft?.candidateName) candidateName.value = draft.candidateName;
    if (draft?.candidateMeta) candidateMeta.value = draft.candidateMeta;
    if (draft?.interviewerName) interviewerName.value = draft.interviewerName;
    if (draft?.interviewDate) interviewDate.value = draft.interviewDate;
    if (draft?.finalDecision) finalDecision.value = draft.finalDecision;
    if (draft?.finalComment) finalComment.value = draft.finalComment;
    if (draft?.draftEvaluations && typeof draft.draftEvaluations === "object") {
      draftEvaluations = draft.draftEvaluations;
    }

    initRoleOptions();

    if (draft?.role && window.interviewData?.[draft.role]) {
      roleSelect.value = draft.role;
    }

    updateQuestionCompetencyOptions(draft?.questionCompetency || "");
    updateEvalCompetencyOptions(draft?.evalCompetency || "");

    if (typeof draft?.currentQuestionIndex === "number") {
      currentQuestionIndex = draft.currentQuestionIndex;
    }

    hydrateDraftFromSavedSessionIfNeeded();
    loadEvaluationDraftToForm();
    renderContent();
  </script>
</body>
</html>
