<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>더즌 구조화 면접 가이드</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
      @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        color: #1e293b;
        background: linear-gradient(135deg, #edf5ff 0%, #dcecff 40%, #eef3ff 100%);
      }

      body {
        min-height: 100vh;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .bg-orb-1,
      .bg-orb-2,
      .bg-orb-3 {
        position: fixed;
        pointer-events: none;
        filter: blur(40px);
        z-index: 0;
      }

      .bg-orb-1 {
        top: -80px;
        left: -80px;
        width: 340px;
        height: 340px;
        border-radius: 48px;
        background: radial-gradient(circle at top left, rgba(255, 232, 246, 0.65), rgba(255, 255, 255, 0) 70%);
      }

      .bg-orb-2 {
        top: 40px;
        right: 0;
        width: 420px;
        height: 420px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(176, 213, 255, 0.35), rgba(255, 255, 255, 0) 70%);
      }

      .bg-orb-3 {
        bottom: 0;
        left: 30%;
        width: 300px;
        height: 300px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(220, 236, 255, 0.55), rgba(255, 255, 255, 0) 72%);
      }

      .app-shell {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      .pdf-root {
        background: white;
      }

      .pdf-break-avoid {
        page-break-inside: avoid;
        break-inside: avoid;
      }
    </style>
  </head>
  <body>
    <div class="bg-orb-1"></div>
    <div class="bg-orb-2"></div>
    <div class="bg-orb-3"></div>

    <div id="app" class="app-shell"></div>

    <script src="interview-data.js"></script>
    <script>
      const VERCEL_APP_URL = "https://interview-guide-roan.vercel.app";

      if (window.location.hostname.includes("github.io")) {
        const currentPath = window.location.pathname || "/";
        const currentSearch = window.location.search || "";
        const currentHash = window.location.hash || "";
        const normalizedPath = currentPath.replace(/^\/interview-guide/, "") || "/";
        window.location.replace(`${VERCEL_APP_URL}${normalizedPath}${currentSearch}${currentHash}`);
      }

      const app = document.getElementById("app");

      let currentPage = "landing";
      let selectedPositionId = window.INTERVIEW_DATA.positions[0]?.id || "";
      let activeNav =
        window.INTERVIEW_DATA.positions[0]?.competencies?.[0]?.id || "final-review";
      let showPdfPreview = false;
      let showCautionModal = false;
      let showDraftModal = false;
      let showCustomQuestionModal = false;
      let showCandidateModal = false;
      let showAddCandidateModal = false;
      let isProgrammaticScroll = false;
      let showScrollTopButton = false;
      let openJdFitEvidence = {};
      let isAiBriefCollapsed = false;

      let selectedCandidateId = "";
      let newCandidateName = "";
      let selectedScores = {};
      let formStateBySession = {};

      const DRAFT_STORAGE_KEY = "dozn_interview_guide_drafts_v1";
      const CUSTOM_QUESTION_STORAGE_KEY = "dozn_interview_custom_questions_v2";
      const CANDIDATE_STORAGE_KEY = "dozn_interview_candidates_v1";
      const CUSTOM_SECTION_ID = "custom-job-questions";
      const CUSTOM_SECTION_NAME = "AI 추천 질문";
      const CUSTOM_QUESTION_TYPES = ["기술·지식 기반", "과거 경험 기반", "상황 가정형", "직무 가치관"];

      let customQuestionForm = {
        type: "과거 경험 기반",
        main: "",
        follow: "",
      };

      function getSelectedPosition() {
        return (
          window.INTERVIEW_DATA.positions.find(
            (position) => position.id === selectedPositionId
          ) || window.INTERVIEW_DATA.positions[0]
        );
      }

      function getSessionKey(positionId = selectedPositionId, candidateId = selectedCandidateId) {
        return `${positionId}__${candidateId || "no_candidate"}`;
      }

      function getScorePrefix(positionId = selectedPositionId, candidateId = selectedCandidateId) {
        return `${getSessionKey(positionId, candidateId)}__`;
      }

      function getDefaultAiBrief() {
        return {
          overallFitScore: null,
          summary: "",
          jdFit: [],
          strengths: [],
          concerns: [],
          verificationPoints: [],
        };
      }

      function getAllCandidates() {
        try {
          return JSON.parse(localStorage.getItem(CANDIDATE_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllCandidates(data) {
        localStorage.setItem(CANDIDATE_STORAGE_KEY, JSON.stringify(data));
      }

      function getCandidatesForPosition(positionId = selectedPositionId) {
        const allCandidates = getAllCandidates();
        return allCandidates[positionId] || [];
      }

      function setCandidatesForPosition(positionId, candidates) {
        const allCandidates = getAllCandidates();
        allCandidates[positionId] = candidates;
        setAllCandidates(allCandidates);
      }

      function getSelectedCandidate() {
        return getCandidatesForPosition(selectedPositionId).find(
          (candidate) => candidate.id === selectedCandidateId
        ) || null;
      }

      function normalizeCandidate(candidate) {
        return {
          id: candidate.id || `candidate_${Date.now()}`,
          name: candidate.name || "이름 없는 후보자",
          createdAt: candidate.createdAt || formatDraftDate(),
          aiBrief: {
            ...getDefaultAiBrief(),
            ...(candidate.aiBrief || {}),
          },
        };
      }

      function createCandidate(positionId, name, aiBrief = getDefaultAiBrief()) {
        const candidates = getCandidatesForPosition(positionId);
        const newCandidate = normalizeCandidate({
          id: `candidate_${Date.now()}`,
          name: name.trim(),
          createdAt: formatDraftDate(),
          aiBrief,
        });

        candidates.unshift(newCandidate);
        setCandidatesForPosition(positionId, candidates);
        return newCandidate;
      }

      function openCandidateModal(positionId) {
        selectedPositionId = positionId;
        showCandidateModal = true;
        render();
      }

      function closeCandidateModal() {
        showCandidateModal = false;
        render();
      }

      function openCandidateGuide(candidateId) {
        selectedCandidateId = candidateId;
        const selected = getSelectedPosition();
        activeNav = selected?.competencies?.[0]?.id || "final-review";
        currentPage = "guide";
        showCandidateModal = false;
        render();

        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: "auto" });
          handleScrollSpy();
        }, 50);
      }

      function openAddCandidateModal() {
        newCandidateName = "";
        showAddCandidateModal = true;
        render();

        setTimeout(() => {
          const input = document.getElementById("new-candidate-name-input");
          if (input) input.focus();
        }, 50);
      }

      function closeAddCandidateModal() {
        showAddCandidateModal = false;
        newCandidateName = "";
        render();
      }

      function updateNewCandidateName(value) {
        newCandidateName = value;
      }

      function addCandidateDirectly() {
        const name = newCandidateName.trim();
        if (!name) {
          alert("후보자명을 입력해주세요.");
          return;
        }

        const candidate = createCandidate(selectedPositionId, name);
        showAddCandidateModal = false;
        newCandidateName = "";
        openCandidateGuide(candidate.id);
      }

      function deleteCandidate(candidateId) {
        const candidates = getCandidatesForPosition(selectedPositionId);
        const target = candidates.find((candidate) => candidate.id === candidateId);
        if (!target) return;

        const ok = confirm(`${target.name} 후보자를 삭제할까요?\n저장된 평가 내용과 추가 질문도 함께 삭제됩니다.`);
        if (!ok) return;

        const sessionKey = getSessionKey(selectedPositionId, candidateId);
        setCandidatesForPosition(
          selectedPositionId,
          candidates.filter((candidate) => candidate.id !== candidateId)
        );

        delete formStateBySession[sessionKey];

        const allCustomQuestions = getAllCustomQuestions();
        delete allCustomQuestions[sessionKey];
        setAllCustomQuestions(allCustomQuestions);

        const scorePrefix = getScorePrefix(selectedPositionId, candidateId);
        Object.keys(selectedScores).forEach((key) => {
          if (key.startsWith(scorePrefix)) delete selectedScores[key];
        });

        if (selectedCandidateId === candidateId) {
          selectedCandidateId = "";
          currentPage = "landing";
        }

        render();
      }

      function goAiResumeAnalysis() {
        window.location.href = `ai-resume.html?positionId=${encodeURIComponent(selectedPositionId)}`;
      }

      function getCurrentAiBrief() {
        const candidate = getSelectedCandidate();
        return candidate?.aiBrief || getDefaultAiBrief();
      }

      function hasAiBrief(brief = getCurrentAiBrief()) {
        return Boolean(
          brief.summary ||
          brief.overallFitScore ||
          brief.jdFit?.length ||
          brief.strengths?.length ||
          brief.concerns?.length ||
          brief.verificationPoints?.length
        );
      }

      function getCompetencies() {
        return getSelectedPosition()?.competencies || [];
      }

      function getNavItems() {
        const customCount = getCurrentCustomQuestions().length;

        return [
          ...getCompetencies().map((item) => ({
            id: item.id,
            name: item.name,
            order: item.order,
          })),
          {
            id: CUSTOM_SECTION_ID,
            name: CUSTOM_SECTION_NAME,
            order: `면접관 직접 등록 · ${customCount}개`,
          },
          {
            id: "final-review",
            name: "최종평가",
            order: "면접 결과 정리",
          },
        ];
      }

      function getDefaultFormState() {
        return {
          candidateName: "",
          interviewer: "",
          interviewDate: "",
          overallComment: "",
          followUpCheck: "",
          finalDecision:
            window.INTERVIEW_DATA.finalOptions?.[0] || "추천",
          questionMemos: {},
        };
      }

      function getFormState() {
        const sessionKey = getSessionKey();
        if (!formStateBySession[sessionKey]) {
          const defaultState = getDefaultFormState();
          const candidate = getSelectedCandidate();
          if (candidate?.name) {
            defaultState.candidateName = candidate.name;
          }
          formStateBySession[sessionKey] = defaultState;
        }
        return formStateBySession[sessionKey];
      }

      function getQuestionMemo(sectionId, questionIndex) {
        const form = getFormState();
        const key = `${sectionId}__${questionIndex}`;
        return form.questionMemos[key] || "";
      }

      function setQuestionMemo(sectionId, questionIndex, value) {
        const form = getFormState();
        const key = `${sectionId}__${questionIndex}`;
        form.questionMemos[key] = value;
      }

      function updateFormField(field, value) {
        const form = getFormState();
        form[field] = value;
      }

      function setFinalDecision(decision) {
        const form = getFormState();
        form.finalDecision = decision;
        render();
      }

      function getFinalDecision() {
        return getFormState().finalDecision;
      }

      function getQuestionScore(sectionId, questionIndex) {
        const key = `${getScorePrefix()}${sectionId}__${questionIndex}`;
        return selectedScores[key] || null;
      }

      function setQuestionScore(sectionId, questionIndex, score) {
        const key = `${getScorePrefix()}${sectionId}__${questionIndex}`;
        selectedScores[key] = score;
        render();
      }

      function getSectionScore(sectionId, questions) {
        const scores = questions
          .map((_, qIndex) => getQuestionScore(sectionId, qIndex))
          .filter((score) => score !== null && score !== undefined);

        if (!scores.length) return null;
        if (scores.length === 1) return scores[0];

        const avg = scores.reduce((sum, score) => sum + score, 0) / scores.length;
        return Number(avg.toFixed(1));
      }

      function setSelectedPosition(id) {
        openCandidateModal(id);
      }

      function startGuide() {
        openCandidateModal(selectedPositionId);
      }

      function goLanding() {
        currentPage = "landing";
        showPdfPreview = false;
        showCautionModal = false;
        showDraftModal = false;
        showCustomQuestionModal = false;
        showCandidateModal = false;
        showAddCandidateModal = false;
        showScrollTopButton = false;
        render();
      }

      function openPdfPreview() {
        showPdfPreview = true;
        render();
      }

      function closePdfPreview() {
        showPdfPreview = false;
        render();
      }

      function openCautionModal() {
        showCautionModal = true;
        render();
      }

      function closeCautionModal() {
        showCautionModal = false;
        render();
      }

      function openDraftModal() {
        showDraftModal = true;
        render();
      }

      function closeDraftModal() {
        showDraftModal = false;
        render();
      }

      function openCustomQuestionModal() {
        customQuestionForm = {
          type: "과거 경험 기반",
          main: "",
          follow: "",
        };
        showCustomQuestionModal = true;
        render();
      }

      function closeCustomQuestionModal() {
        showCustomQuestionModal = false;
        render();
      }

      function updateCustomQuestionForm(field, value) {
        customQuestionForm[field] = value;
      }

      function getAllCustomQuestions() {
        try {
          return JSON.parse(localStorage.getItem(CUSTOM_QUESTION_STORAGE_KEY)) || {};
        } catch (e) {
          return {};
        }
      }

      function setAllCustomQuestions(data) {
        localStorage.setItem(CUSTOM_QUESTION_STORAGE_KEY, JSON.stringify(data));
      }

      function getCustomQuestionPoints(type) {
        const pointsByType = {
          "기술·지식 기반": ["핵심 개념 이해도", "실무 적용 경험", "업무 기준 보유 여부"],
          "과거 경험 기반": ["본인 역할의 명확성", "실제 수행 경험", "결과와 학습"],
          "상황 가정형": ["상황 판단 기준", "대응 순서", "리스크 인식"],
          "직무 가치관": ["직무 이해도", "업무에서 중요하게 보는 기준", "성장 방향성"],
        };

        return pointsByType[type] || ["직무 경험", "판단 기준", "업무 적용"];
      }

      function getCustomQuestionRubric() {
        return {
          purpose: "직무 수행에 필요한 경험, 판단 기준, 실무 적용 방식을 확인합니다.",
          good: "직무 경험, 본인 역할, 판단 기준, 결과가 구체적으로 설명됩니다.",
          average: "경험은 있으나 본인 역할이나 판단 기준 설명이 다소 일반적입니다.",
          weak: "추상적인 답변에 머물거나 실제 직무 경험과 연결되지 않습니다.",
        };
      }

      function normalizeCustomQuestion(question) {
        const type = question.type || "과거 경험 기반";

        return {
          id: question.id || `custom_${Date.now()}`,
          type,
          main: question.main || "",
          follow: Array.isArray(question.follow)
            ? question.follow
            : question.follow
              ? [question.follow]
              : [],
          points: question.points?.length ? question.points : getCustomQuestionPoints(type),
          rubric: question.rubric || getCustomQuestionRubric(),
        };
      }

      function getCurrentCustomQuestions() {
        const allCustomQuestions = getAllCustomQuestions();
        return (allCustomQuestions[getSessionKey()] || []).map(normalizeCustomQuestion);
      }

      function setCurrentCustomQuestions(questions) {
        const allCustomQuestions = getAllCustomQuestions();
        allCustomQuestions[getSessionKey()] = questions.map(normalizeCustomQuestion);
        setAllCustomQuestions(allCustomQuestions);
      }

      function saveCustomQuestion() {
        const main = customQuestionForm.main.trim();

        if (!main) {
          alert("메인 질문을 입력해주세요.");
          return;
        }

        const type = customQuestionForm.type || "과거 경험 기반";
        const newQuestion = normalizeCustomQuestion({
          id: `custom_${Date.now()}`,
          type,
          main,
          follow: customQuestionForm.follow.trim()
            ? [customQuestionForm.follow.trim()]
            : [],
          points: getCustomQuestionPoints(type),
          rubric: getCustomQuestionRubric(),
        });

        const questions = getCurrentCustomQuestions();
        questions.push(newQuestion);
        setCurrentCustomQuestions(questions);

        showCustomQuestionModal = false;
        activeNav = CUSTOM_SECTION_ID;
        render();

        setTimeout(() => {
          const el = document.getElementById(CUSTOM_SECTION_ID);
          if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 50);
      }

      function deleteCustomQuestion(questionId) {
        const ok = confirm("이 직무 질문을 삭제할까요?");
        if (!ok) return;

        const questions = getCurrentCustomQuestions().filter(
          (question) => question.id !== questionId
        );
        setCurrentCustomQuestions(questions);
        render();
      }


      function getCurrentVisibleSectionId() {
        const navItems = getNavItems();
        const sectionIds = navItems.map((item) => item.id);

        const sections = sectionIds
          .map((id) => document.getElementById(id))
          .filter(Boolean);

        if (!sections.length) return activeNav;

        const viewportOffset = 140;
        let currentId = sectionIds[0];

        for (const section of sections) {
          const rect = section.getBoundingClientRect();
          if (rect.top - viewportOffset <= 0) {
            currentId = section.id;
          }
        }

        return currentId;
      }

      function handleScrollSpy() {
        if (currentPage !== "guide") return;
        if (showPdfPreview || showCautionModal || showDraftModal || showCustomQuestionModal || showCandidateModal) return;
        if (isProgrammaticScroll) return;

        const currentId = getCurrentVisibleSectionId();
        if (currentId && currentId !== activeNav) {
          activeNav = currentId;
          render();
        }
      }

      function scrollToSection(id) {
        activeNav = id;
        isProgrammaticScroll = true;
        render();

        setTimeout(() => {
          const el = document.getElementById(id);
          if (el) {
            el.scrollIntoView({ behavior: "smooth", block: "start" });
          }

          setTimeout(() => {
            isProgrammaticScroll = false;
            const currentId = getCurrentVisibleSectionId();
            if (currentId && currentId !== activeNav) {
              activeNav = currentId;
              render();
            }
          }, 500);
        }, 10);
      }

      function scrollToTop() {
        isProgrammaticScroll = true;

        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });

        setTimeout(() => {
          isProgrammaticScroll = false;
          activeNav = getNavItems()[0]?.id || "final-review";
          render();
        }, 500);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function cleanupGeneratedText(value) {
        return String(value || "")
          .replace(/\[[0-9]+p\]/gi, "")
          .replace(/<PARSED TEXT[^>]*>/gi, "")
          .replace(/[ \t]+/g, " ")
          .replace(/[“"]([^“”"]{80,})[”"]/g, (match, inner) => `“${inner.replace(/\s+/g, " ").trim().slice(0, 45)}...”`)
          .replace(/(\d+)\s*\/\s*100\s*종합\s*적합도\s*[\.:：-]?/gi, "")
          .replace(/(Java\s*\/\s*Spring|TypeScript|Next\.js|React|Node\.js|Python)\s*기반\s*[가-힣A-Za-z0-9|·\s]{0,35}\|?\s*경력\s*\d+\s*년\s*\d*\s*개월?/gi, "")
          .replace(/이력서에서는\s*/g, "")
          .replace(/내용이\s*우선적으로\s*확인되며,?/g, "")
          .replace(/필수자격\/필요경험\s*중\s*/g, "")
          .replace(/요건과\s*연결되는\s*정황/g, "관련 경험으로 볼 수 있는 단서")
          .replace(/경험은\s*실질적\s*변화를\s*만든\s*사례로\s*볼\s*여지가\s*있습니다/g, "실질적인 개선 경험으로 해석할 수 있습니다")
          .replace(/또한(?=[A-Za-z가-힣])/g, "")
          .replace(/,(?=\S)/g, ", ")
          .replace(/\.(?=\S)/g, ". ")
          .replace(/\)(?=\S)/g, ") ")
          .replace(/([가-힣])\|([가-힣])/g, "$1 / $2")
          .replace(/\s{2,}/g, " ")
          .trim();
      }

      function shortenLongQuotedText(value) {
        return cleanupGeneratedText(value).replace(/[“"]([^“”"]{80,})[”"]/g, (match, inner) => {
          const compact = inner.replace(/\s+/g, " ").trim();
          return `“${compact.slice(0, 45)}...”`;
        });
      }

      function getJdFitEvidenceKey(index) {
        return `${selectedPositionId}__${selectedCandidateId || "none"}__${index}`;
      }

      function toggleJdFitEvidence(index) {
        const key = getJdFitEvidenceKey(index);
        openJdFitEvidence[key] = !openJdFitEvidence[key];
        render();
      }

      function toggleAiBriefCollapsed() {
        isAiBriefCollapsed = !isAiBriefCollapsed;
        render();
      }

      function isAiRecommendedQuestion(question) {
        return Boolean(
          question?.id?.startsWith("ai_custom") ||
          String(question?.type || "").includes("AI") ||
          question?.sourceEvidence ||
          question?.relatedCompetency
        );
      }

      function displayAnalysisText(value) {
        return shortenLongQuotedText(value)
          .replace(/([가-힣])([A-Za-z])/g, "$1 $2")
          .replace(/([A-Za-z])([가-힣])/g, "$1 $2")
          .replace(/(TypeScript|Next\.js|Java\/Spring|Spring|React|API|TCP|REST API|Redis|AWS|DB|ORM)(?=[가-힣])/g, "$1 ")
          .replace(/([가-힣])(기반|경험|역량|업무|개발|설계|운영|분석|관리|능력|이해|확인|필요|수행|프로젝트|서비스|시스템)/g, "$1 $2")
          .replace(/\s{2,}/g, " ")
          .trim();
      }

      function nl2br(value) {
        return escapeHtml(value).replace(/\n/g, "<br>");
      }

      function getDrafts() {
        try {
          return JSON.parse(localStorage.getItem(DRAFT_STORAGE_KEY)) || [];
        } catch (e) {
          return [];
        }

      function setDrafts(drafts) {
        localStorage.setItem(DRAFT_STORAGE_KEY, JSON.stringify(drafts));
      }

      function formatDraftDate(date = new Date()) {
        const yyyy = date.getFullYear();
        const mm = String(date.getMonth() + 1).padStart(2, "0");
        const dd = String(date.getDate()).padStart(2, "0");
        const hh = String(date.getHours()).padStart(2, "0");
        const mi = String(date.getMinutes()).padStart(2, "0");
        return `${yyyy}.${mm}.${dd} ${hh}:${mi}`;
      }

      function getCurrentPositionScores(positionId, candidateId = selectedCandidateId) {
        const prefix = getScorePrefix(positionId, candidateId);
        return Object.fromEntries(
          Object.entries(selectedScores).filter(([key]) => key.startsWith(prefix))
        );
      }

      function saveDraft() {
        const selected = getSelectedPosition();
        const form = getFormState();

        if (!form.candidateName.trim()) {
          alert("후보자명을 입력한 뒤 저장해주세요.");
          return;
        }

        const drafts = getDrafts();

        const draft = {
          id: `draft_${Date.now()}`,
          savedAt: formatDraftDate(),
          positionId: selectedPositionId,
          positionName: selected.name,
          candidateId: selectedCandidateId,
          candidateName: form.candidateName.trim(),
          aiBrief: JSON.parse(JSON.stringify(getCurrentAiBrief())),
          interviewer: form.interviewer || "",
          interviewDate: form.interviewDate || "",
          formState: JSON.parse(JSON.stringify(form)),
          customQuestions: JSON.parse(JSON.stringify(getCurrentCustomQuestions())),
          selectedScores: JSON.parse(
            JSON.stringify(getCurrentPositionScores(selectedPositionId, selectedCandidateId))
          ),
        };

        drafts.unshift(draft);
        setDrafts(drafts);

        alert("저장되었습니다.");
      }

      function loadDraft(draftId) {
        const drafts = getDrafts();
        const draft = drafts.find((item) => item.id === draftId);

        if (!draft) {
          alert("저장된 데이터를 찾을 수 없습니다.");
          return;
        }

        selectedPositionId = draft.positionId;
        selectedCandidateId = draft.candidateId || selectedCandidateId || "";
        const selected = getSelectedPosition();
        activeNav = selected?.competencies?.[0]?.id || "final-review";

        const sessionKey = getSessionKey(draft.positionId, selectedCandidateId);
        formStateBySession[sessionKey] = JSON.parse(
          JSON.stringify(draft.formState || getDefaultFormState())
        );

        if (draft.customQuestions) {
          const allCustomQuestions = getAllCustomQuestions();
          allCustomQuestions[sessionKey] = draft.customQuestions;
          setAllCustomQuestions(allCustomQuestions);
        }

        Object.keys(selectedScores).forEach((key) => {
          if (key.startsWith(getScorePrefix(draft.positionId, selectedCandidateId))) {
            delete selectedScores[key];
          }
        });

        Object.assign(selectedScores, draft.selectedScores || {});

        currentPage = "guide";
        showDraftModal = false;
        render();

        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: "auto" });
          handleScrollSpy();
        }, 50);
      }

      function deleteDraft(draftId) {
        const ok = confirm("이 저장 기록을 삭제할까요?");
        if (!ok) return;

        const drafts = getDrafts().filter((item) => item.id !== draftId);
        setDrafts(drafts);
        render();
      }

        const ok = confirm("현재 선택한 포지션의 작성 내용을 초기화할까요?");

        formStateBySession[getSessionKey()] = getDefaultFormState();
        const candidate = getSelectedCandidate();
        if (candidate?.name) {

        }

        Object.keys(selectedScores).forEach((key) => {
          if (key.startsWith(getScorePrefix())) {

        });

        render();

                  </div>
                ${
                  hasAiBrief()
                    ? `
                <div class="mt-6 rounded-3xl border border-blue-100 bg-blue-50/40 p-5">
                  <p class="text-lg font-semibold text-slate-900">AI 이력서 분석 브리프</p>
                  <div class="mt-3 text-sm leading-7 text-slate-700">
                    <p><span class="font-semibold text-slate-900">AI 참고 점수</span> : ${getCurrentAiBrief().overallFitScore || "-"} / 100</p>
                    <p class="mt-2"><span class="font-semibold text-slate-900">지원자 요약</span> : ${nl2br(shortenLongQuotedText(getCurrentAiBrief().summary || "-"))}</p>
                    <p class="mt-2"><span class="font-semibold text-slate-900">JD 역량 적합도</span> : ${(getCurrentAiBrief().jdFit || []).map((item) => `${escapeHtml(item.competency)} ${Number(item.score || 0)}/100`).join(" / ") || "-"}</p>
                    <p class="mt-2"><span class="font-semibold text-slate-900">검증 포인트</span> : ${(getCurrentAiBrief().verificationPoints || []).map((item) => escapeHtml(shortenLongQuotedText(item))).join(" / ") || "-"}</p>
                  </div>
                </div>
                `
                    : ""
                }

                <div class="mt-6 space-y-5">
                  ${competencies
                    .map((item) => {
                      const sectionScore = getSectionScore(item.id, item.questions);
                      return `
                    <div class="pdf-break-avoid rounded-3xl border border-slate-200 p-5">
                      <div class="mb-3 flex items-center justify-between gap-3">
                        <div>
                          <p class="text-sm font-medium text-blue-600">${item.order}</p>
                          <p class="text-xl font-semibold text-slate-900">${item.name}</p>
                        </div>
                        <div class="rounded-full bg-blue-50 px-4 py-2 text-sm font-semibold text-blue-700">
                          ${sectionScore !== null ? sectionScore : "-"} / 5점
                        </div>
                      </div>

                      ${item.questions
                        .map((q, qIndex) => {
                          const memo = getQuestionMemo(item.id, qIndex);
                          const score = getQuestionScore(item.id, qIndex);
                          return `
                            <div class="pdf-question-card">
                              <p class="pdf-main-question-label">${data.labels.mainQuestion}</p>
                              <p class="pdf-main-question-text">${escapeHtml(displayAnalysisText(q.main))}</p>

                              <div class="pdf-score-box">점수 ${score ?? "-"} / 5</div>

                              <div class="pdf-memo-box">
                                <p class="pdf-memo-title">${data.labels.memoSummary}</p>
                                <p class="pdf-memo-text">${memo ? nl2br(memo) : "작성된 메모 없음"}</p>
                              </div>
                            </div>
                          `;
                        })
                        .join("")}
                    </div>
                  `;
                    })
                    .join("")}
                </div>

                ${
                  customQuestions.length
                    ? `
                <div class="mt-6 space-y-5">
                  <div class="pdf-break-avoid rounded-3xl border border-orange-100 p-5">
                    <div class="mb-3 flex items-center justify-between gap-3">
                      <div>
                        <p class="text-sm font-medium text-orange-600">면접관 직접 등록</p>
                        <p class="text-xl font-semibold text-slate-900">직무 전문성/역량 추가 질문</p>
                      </div>
                    </div>

                    ${customQuestions
                      .map((q, qIndex) => {
                        const memo = getQuestionMemo(CUSTOM_SECTION_ID, qIndex);
                        const score = getQuestionScore(CUSTOM_SECTION_ID, qIndex);
                        return `
                          <div class="pdf-question-card">
                            <div class="mb-2 inline-flex rounded-full bg-orange-50 px-3 py-1 text-xs font-semibold text-orange-700">
                              ${escapeHtml(q.type)}
                            </div>
                            <p class="pdf-main-question-label">${data.labels.mainQuestion}</p>
                            <p class="pdf-main-question-text">${escapeHtml(displayAnalysisText(q.main))}</p>
                            ${
                              q.follow?.length
                                ? `<p class="mt-2 text-sm leading-6 text-slate-600"><span class="font-semibold text-slate-900">꼬리 질문</span> : ${q.follow.map(escapeHtml).join(" / ")}</p>`
                                : ""
                            }

                            <div class="pdf-score-box">점수 ${score ?? "-"} / 5</div>

                            <div class="pdf-memo-box">
                              <p class="pdf-memo-title">${data.labels.memoSummary}</p>
                              <p class="pdf-memo-text">${memo ? nl2br(memo) : "작성된 메모 없음"}</p>
                            </div>

                      .join("")}

                </div>
                `
                    : ""
                }

                <div class="pdf-force-page-break"></div>
                <div class="pdf-final-grid pdf-final-section">
                  <div class="pdf-final-opinion-card">
                    <p class="pdf-final-card-title">${data.labels.overallCommentTitle}</p>
                    <p class="pdf-final-card-text">
                      ${form.overallComment ? nl2br(form.overallComment) : escapeHtml(selected.pdfPreview?.overallComment || "작성된 종합 의견 없음")}
                    </p>
                  </div>
                  <div class="pdf-followup-card">
                    <p class="pdf-final-card-title">${data.labels.followUpTitle}</p>
                    <div class="pdf-final-card-text">
                      ${
                        form.followUpCheck
                          ? nl2br(form.followUpCheck)
                          : (selected.pdfPreview?.followUps?.length
                              ? selected.pdfPreview.followUps.map((item) => `• ${escapeHtml(item)}`).join("<br>")
                              : "작성된 추가 확인사항 없음")
                      }
                    </div>
                  </div>
                </div>

                <div class="pdf-final-decision-card rounded-3xl bg-slate-900 px-6 py-5 text-white">
                  <p class="text-sm font-medium text-slate-300">${data.labels.finalReview}</p>
                  <div class="mt-3 flex flex-wrap items-center justify-between gap-3">
                    <p class="text-2xl font-semibold">${escapeHtml(currentFinalDecision)}</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        `;

      function renderCustomQuestionModal() {

        return `

            <div class="max-h-[90vh] w-full max-w-2xl overflow-auto rounded-[32px] bg-white p-6 shadow-2xl md:p-8">
              <div class="mb-6 flex items-center justify-between gap-3 border-b border-slate-200 pb-4">
                <div>
                  <p class="text-sm font-medium text-orange-600">질문 등록</p>
                  <h3 class="mt-1 text-2xl font-semibold text-slate-900">직무 전문성 질문 추가</h3>

                    onchange="updateCustomQuestionForm('type', this.value)"
                  >
                    ${CUSTOM_QUESTION_TYPES
                      .map(

      function renderDraftModal() {

        const drafts = getDrafts();
        const selectedDrafts = drafts.filter(

        );

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4 py-8 backdrop-blur-sm">
            <div class="max-h-[90vh] w-full max-w-3xl overflow-auto rounded-[32px] bg-white p-5 shadow-2xl md:p-8">
              <div class="mb-6 flex items-center justify-between gap-3 border-b border-slate-200 pb-4">

                  <p class="text-sm font-medium text-blue-600">저장 기록</p>
                  <h3 class="mt-1 text-2xl font-semibold text-slate-900">저장된 평가 불러오기</h3>

                <button

                          )}</p>
                          <div class="mt-2 space-y-1 text-sm text-slate-500">
                            <p>포지션: ${escapeHtml(draft.positionName || "-")}</p>
                            <p>면접관: ${escapeHtml(draft.interviewer || "-")}</p>

              }

      function renderCandidateModal() {
        if (!showCandidateModal) return "";

        const selected = getSelectedPosition();
        const candidates = getCandidatesForPosition(selectedPositionId);

        return `
          <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/40 px-4 py-8 backdrop-blur-sm">
            <div class="max-h-[90vh] w-full max-w-2xl overflow-auto rounded-[32px] bg-white p-6 shadow-2xl md:p-8">
              <div class="mb-6 flex items-center justify-between gap-3 border-b border-slate-200 pb-4">
                <div>
                  <p class="text-sm font-medium text-blue-600">후보자 선택</p>
                  <h3 class="mt-1 text-2xl font-semibold text-slate-900">${selected.name}</h3>
                  <p class="mt-2 text-sm leading-6 text-slate-500">
                    면접을 진행할 후보자명을 선택해주세요.
                  </p>
                </div>
                <button
                  onclick="closeCandidateModal()"
                  class="rounded-full border border-slate-200 px-4 py-2 text-sm font-medium text-slate-700"

                </button>

              <div class="space-y-3">

                  !candidates.length
                    ? `

                `

                    >
                      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                        <button
                          onclick="openCandidateGuide('${candidate.id}')"
                          class="min-w-0 flex-1 text-left"
                        >
                          <p class="text-lg font-semibold text-slate-900">${escapeHtml(candidate.name)}</p>
                          <p class="mt-1 text-sm text-slate-500">생성일: ${escapeHtml(candidate.createdAt || "-")}</p>

                        <div class="flex shrink-0 flex-wrap items-center gap-2">

                            class="rounded-full border border-rose-200 bg-rose-50 px-3 py-1.5 text-xs font-semibold text-rose-700 transition hover:bg-rose-100"

                            삭제

              </div>

              <div class="mt-6 grid gap-4 border-t border-slate-100 pt-5 sm:grid-cols-2">
                <div>
                  <button
                    onclick="openAddCandidateModal()"
                    class="w-full rounded-full border border-blue-200 bg-white px-5 py-3 text-sm font-semibold text-blue-700 shadow-sm transition hover:bg-blue-50"
                  >
                    + 후보자 직접 추가
                  </button>
                  <p class="mt-2 text-center text-xs leading-5 text-slate-500">AI 분석 없이 후보자 세션만 생성합니다.</p>
                </div>
                <div>
                  <button
                    onclick="goAiResumeAnalysis()"
                    class="w-full rounded-full bg-[linear-gradient(90deg,#3b82f6,#69a4ff)] px-5 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(59,130,246,0.25)] transition hover:scale-[1.01]"
                  >
                    AI 이력서 분석으로 후보자 추가
                  </button>
                  <p class="mt-2 text-center text-xs leading-5 text-slate-500">이력서를 분석해 AI 브리프와 추천 질문을 생성합니다.</p>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderAddCandidateModal() {
        if (!showAddCandidateModal) return "";

        const selected = getSelectedPosition();

        return `
          <div class="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/45 px-4 py-8 backdrop-blur-sm">
            <div class="w-full max-w-md rounded-[32px] bg-white p-6 shadow-2xl md:p-7">
              <div class="mb-5 border-b border-slate-100 pb-4">
                <p class="text-sm font-medium text-blue-600">후보자 직접 추가</p>
                <h3 class="mt-1 text-2xl font-semibold text-slate-900">${selected.name}</h3>
                <p class="mt-2 text-sm leading-6 text-slate-500">

              <label class="text-sm font-semibold text-slate-700">
                후보자명 <span class="text-rose-500">*</span>

                  class="mt-2 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm outline-none transition placeholder:text-slate-400 focus:border-blue-300 focus:bg-white focus:ring-4 focus:ring-blue-100"

                직접 추가한 후보자는 AI 브리프 없이 생성되며, 이후 면접 질문과 평가 기록을 후보자별로 저장할 수 있습니다.
              </div>

              <div class="mt-6 flex justify-end gap-2 border-t border-slate-100 pt-5">
                <button
                  onclick="closeAddCandidateModal()"
                  class="rounded-full border border-slate-200 bg-white px-5 py-3 text-sm font-semibold text-slate-700 transition hover:bg-slate-50"
                >
                  취소
                </button>
                <button
                  onclick="addCandidateDirectly()"
                  class="rounded-full bg-[linear-gradient(90deg,#3b82f6,#69a4ff)] px-5 py-3 text-sm font-semibold text-white shadow-[0_10px_25px_rgba(59,130,246,0.25)] transition hover:scale-[1.01]"

      function renderScrollTopButton() {
        if (
          currentPage !== "guide" ||
          !showScrollTopButton ||
          showPdfPreview ||
          showCautionModal ||
          showDraftModal ||
          showCustomQuestionModal ||
          showCandidateModal ||
          showAddCandidateModal
        ) {
          return "";
        }

        return `
          <button
            onclick="scrollToTop()"
            class="fixed bottom-6 right-6 z-40 flex h-12 w-12 items-center justify-center rounded-full border border-slate-200 bg-white text-xl font-bold text-slate-700 shadow-[0_10px_25px_rgba(15,23,42,0.16)] transition hover:-translate-y-0.5 hover:bg-slate-50"
            aria-label="맨 위로 이동"
            title="맨 위로 이동"
          >
            ↑
          </button>
        `;
      }

      function downloadPdf() {
        const selected = getSelectedPosition();
        const form = getFormState();
        const element = document.getElementById("pdf-content");
        if (!element) return;

        const fileName = `${selected.name}_${form.candidateName || "면접결과"}.pdf`;

        const opt = {
          margin: [10, 10, 10, 10],
          filename: fileName,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: {
            scale: 2,
            useCORS: true,
            scrollY: 0,
          },
          jsPDF: {
            unit: "mm",
            format: "a4",
            orientation: "portrait",
          },
          pagebreak: {
            mode: ["css", "legacy"],
            avoid: [".pdf-question-card", ".pdf-memo-box", ".pdf-final-opinion-card", ".pdf-followup-card", ".pdf-final-decision-card"],
            before: [".pdf-force-page-break"],
          },
        };

        html2pdf().set(opt).from(element).save();
      }

      function initializeFromUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const positionId = params.get("positionId");
        const candidateId = params.get("candidateId");

        if (!positionId || !candidateId) return;

        const positionExists = window.INTERVIEW_DATA.positions.some(
          (position) => position.id === positionId
        );

        if (!positionExists) return;

        selectedPositionId = positionId;
        const candidateExists = getCandidatesForPosition(positionId).some(
          (candidate) => candidate.id === candidateId
        );

        if (!candidateExists) return;

        selectedCandidateId = candidateId;
        const selected = getSelectedPosition();
        activeNav = selected?.competencies?.[0]?.id || "final-review";
        currentPage = "guide";

        window.history.replaceState({}, document.title, window.location.pathname);
      }

      function render() {
        app.innerHTML = `
          ${currentPage === "landing" ? renderLanding() : renderGuide()}
          ${renderCautionModal()}
          ${renderPdfPreview()}
          ${renderCustomQuestionModal()}
          ${renderDraftModal()}
          ${renderCandidateModal()}
          ${renderAddCandidateModal()}
          ${renderScrollTopButton()}
        `;
      }

      window.setSelectedPosition = setSelectedPosition;
      window.startGuide = startGuide;


      // === Phase57: Supabase 공통 후보자 목록 연동 ===
      let remoteCandidatesLoaded = false;
      let remoteCandidatesLoading = false;
      let remoteCandidatesCache = [];

      function normalizePositionCompare(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/개발자/g, "개발")
          .replace(/[\s_\-\/]+/g, "")
          .trim();
      }

      function getLocalCandidatesForPosition(positionId = selectedPositionId) {
        const allCandidates = getAllCandidates();
        return allCandidates[positionId] || [];
      }

      function getRemoteLatestAnalysis(remoteCandidate) {
        const analyses = Array.isArray(remoteCandidate?.ai_resume_analyses)
          ? [...remoteCandidate.ai_resume_analyses]
          : [];

        if (!analyses.length) return null;

        const latestId = remoteCandidate.latest_analysis_id;
        const matched = latestId ? analyses.find((item) => item.id === latestId) : null;
        if (matched) return matched;

        analyses.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
        return analyses[0] || null;
      }

      function getRemoteAnalysisResult(remoteCandidate) {
        const latestAnalysis = getRemoteLatestAnalysis(remoteCandidate);
        return latestAnalysis?.analysis_result || {};
      }

      function buildAiBriefFromAnalysis(result = {}, latestAnalysis = null) {
        return {
          ...getDefaultAiBrief(),
          overallFitScore:
            result.overallFitScore ??
            result.overall_fit_score ??
            latestAnalysis?.overall_fit_score ??
            null,
          summary: result.summary || "",
          jdFit: Array.isArray(result.jdFit) ? result.jdFit : [],
          strengths: Array.isArray(result.strengths) ? result.strengths : [],
          concerns: Array.isArray(result.concerns) ? result.concerns : [],
          verificationPoints: Array.isArray(result.verificationPoints)
            ? result.verificationPoints
            : [],
        };
      }

      function getRemoteCandidateQuestions(remoteCandidate) {
        const latestAnalysis = getRemoteLatestAnalysis(remoteCandidate);
        const result = latestAnalysis?.analysis_result || {};

        const candidates = [
          result.customQuestions,
          result.selectedQuestions,
          result.selected_questions,
          latestAnalysis?.selected_questions,
        ];

        for (const item of candidates) {
          if (Array.isArray(item) && item.length) return item;
        }

        return [];
      }

      function remoteCandidateMatchesPosition(remoteCandidate, positionId = selectedPositionId) {
        const selected = window.INTERVIEW_DATA.positions.find((position) => position.id === positionId);
        const currentKeys = [
          positionId,
          selected?.id,
          selected?.name,
        ].map(normalizePositionCompare).filter(Boolean);

        const remoteKey = normalizePositionCompare(remoteCandidate?.position_title);
        return currentKeys.some((key) => key === remoteKey || key.includes(remoteKey) || remoteKey.includes(key));
      }

      function normalizeRemoteCandidate(remoteCandidate) {
        const latestAnalysis = getRemoteLatestAnalysis(remoteCandidate);
        const result = latestAnalysis?.analysis_result || {};

        return normalizeCandidate({
          id: remoteCandidate.id,
          name: remoteCandidate.candidate_name || remoteCandidate.name,
          createdAt: remoteCandidate.created_at ? formatDraftDate(new Date(remoteCandidate.created_at)) : formatDraftDate(),
          aiBrief: buildAiBriefFromAnalysis(result, latestAnalysis),
          remoteCandidateId: remoteCandidate.id,
          remoteAnalysisId: latestAnalysis?.id || remoteCandidate.latest_analysis_id || null,
          remotePositionTitle: remoteCandidate.position_title,
          isAddedToGuide: Boolean(remoteCandidate.is_added_to_guide),
          source: remoteCandidate.source || "remote",
          remoteRaw: remoteCandidate,
        });
      }

      async function loadRemoteCandidates(force = false) {
        if (remoteCandidatesLoading) return;
        if (remoteCandidatesLoaded && !force) return;

        remoteCandidatesLoading = true;

        try {
          const response = await fetch(`/api/candidates?ts=${Date.now()}`, {
            method: "GET",
            cache: "no-store",
          });

          const payload = await response.json();

          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || payload.detail || "후보자 목록을 불러오지 못했습니다.");
          }

          remoteCandidatesCache = Array.isArray(payload.candidates) ? payload.candidates : [];
          remoteCandidatesLoaded = true;
        } catch (error) {
          console.error("[remote-candidates-load-error]", error);
        } finally {
          remoteCandidatesLoading = false;
        }
      }

      function getCandidatesForPosition(positionId = selectedPositionId) {
        const localCandidates = getLocalCandidatesForPosition(positionId).map(normalizeCandidate);
        const remoteCandidates = remoteCandidatesCache
          .filter((candidate) => remoteCandidateMatchesPosition(candidate, positionId))
          .map(normalizeRemoteCandidate);

        const merged = [];
        const seen = new Set();

        for (const candidate of [...remoteCandidates, ...localCandidates]) {
          const key = candidate.id || `${candidate.name}_${candidate.createdAt}`;
          if (seen.has(key)) continue;
          seen.add(key);
          merged.push(candidate);
        }

        return merged;
      }

      function normalizeCustomQuestion(question) {
        const type = question.type || "과거 경험 기반";
        return {
          id: question.id || `custom_${Date.now()}_${Math.random().toString(16).slice(2)}`,
          type,
          main: question.main || "",
          follow: Array.isArray(question.follow)
            ? question.follow
            : question.follow
              ? [question.follow]
              : [],
          points: question.points?.length ? question.points : getCustomQuestionPoints(type),
          rubric: question.rubric || getCustomQuestionRubric(),
          intent: question.intent || question.purpose || "",
          sourceEvidence: question.sourceEvidence || question.evidence || "",
          relatedCompetency: question.relatedCompetency || question.competency || "",
          isAiRecommended: question.isAiRecommended ?? true,
        };
      }

      function persistCandidateLocally(positionId, candidate) {
        const allCandidates = getAllCandidates();
        const candidates = allCandidates[positionId] || [];
        const normalized = normalizeCandidate(candidate);
        const existingIndex = candidates.findIndex((item) => item.id === normalized.id);

        if (existingIndex >= 0) {
          candidates[existingIndex] = {
            ...candidates[existingIndex],
            ...normalized,
            aiBrief: normalized.aiBrief,
          };
        } else {
          candidates.unshift(normalized);
        }

        allCandidates[positionId] = candidates;
        setAllCandidates(allCandidates);
        return normalized;
      }

      function seedCandidateSession(candidate) {
        if (!candidate) return;

        persistCandidateLocally(selectedPositionId, candidate);

        const sessionKey = getSessionKey(selectedPositionId, candidate.id);
        const remoteRaw = candidate.remoteRaw;
        const remoteQuestions = remoteRaw ? getRemoteCandidateQuestions(remoteRaw) : [];

        if (remoteQuestions.length) {
          const allCustomQuestions = getAllCustomQuestions();
          allCustomQuestions[sessionKey] = remoteQuestions.map(normalizeCustomQuestion);
          setAllCustomQuestions(allCustomQuestions);
        }

        if (!formStateBySession[sessionKey]) {
          const defaultState = getDefaultFormState();
          defaultState.candidateName = candidate.name || "";
          formStateBySession[sessionKey] = defaultState;
        } else if (candidate.name && !formStateBySession[sessionKey].candidateName) {
          formStateBySession[sessionKey].candidateName = candidate.name;
        }
      }

      async function markRemoteCandidateAdded(candidateId) {
        if (!candidateId) return;

        try {
          await fetch("/api/candidates", {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              candidate_id: candidateId,
              is_added_to_guide: true,
              status: "added_to_guide",
            }),
          });
        } catch (error) {
          console.error("[remote-candidate-added-error]", error);
        }
      }

      async function createCandidate(positionId, name, aiBrief = getDefaultAiBrief()) {
        const selected = window.INTERVIEW_DATA.positions.find((position) => position.id === positionId);

        try {
          const response = await fetch("/api/candidates", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              position_title: selected?.name || positionId,
              candidate_name: name.trim(),
              source: "manual",
              status: "registered",
              is_added_to_guide: true,
            }),
          });

          const payload = await response.json();
          if (!response.ok || !payload.ok) throw new Error(payload.error || payload.detail || "후보자 저장 실패");

          const newCandidate = normalizeCandidate({
            id: payload.candidate_id || `candidate_${Date.now()}`,
            name: name.trim(),
            createdAt: formatDraftDate(),
            aiBrief,
            remoteCandidateId: payload.candidate_id || null,
          });

          persistCandidateLocally(positionId, newCandidate);
          await loadRemoteCandidates(true);
          return newCandidate;
        } catch (error) {
          console.error("[remote-candidate-create-error]", error);

          const fallbackCandidate = normalizeCandidate({
            id: `candidate_${Date.now()}`,
            name: name.trim(),
            createdAt: formatDraftDate(),
            aiBrief,
          });
          persistCandidateLocally(positionId, fallbackCandidate);
          return fallbackCandidate;
        }
      }

      async function openCandidateModal(positionId) {
        selectedPositionId = positionId;
        showCandidateModal = true;
        render();
        await loadRemoteCandidates(true);
        render();
      }

      async function addCandidateDirectly() {
        const name = newCandidateName.trim();
        if (!name) {
          alert("후보자명을 입력해주세요.");
          return;
        }

        const candidate = await createCandidate(selectedPositionId, name);
        showAddCandidateModal = false;
        newCandidateName = "";
        openCandidateGuide(candidate.id);
      }

      function openCandidateGuide(candidateId) {
        selectedCandidateId = candidateId;
        const candidate = getSelectedCandidate();
        seedCandidateSession(candidate);

        if (candidate?.remoteCandidateId || candidate?.id) {
          markRemoteCandidateAdded(candidate.remoteCandidateId || candidate.id);
        }

        const selected = getSelectedPosition();
        activeNav = selected?.competencies?.[0]?.id || "final-review";
        currentPage = "guide";
        showCandidateModal = false;
        render();

        setTimeout(() => {
          window.scrollTo({ top: 0, behavior: "auto" });
          handleScrollSpy();
        }, 50);
      }

      async function deleteCandidate(candidateId) {
        const candidates = getCandidatesForPosition(selectedPositionId);
        const target = candidates.find((candidate) => candidate.id === candidateId);
        if (!target) return;

        const ok = confirm(`${target.name} 후보자를 삭제할까요?\n공통 저장된 후보자/AI 분석 결과도 함께 삭제될 수 있습니다.`);
        if (!ok) return;

        try {
          if (target.remoteCandidateId || target.remoteAnalysisId || /^[0-9a-f-]{30,}$/i.test(candidateId)) {
            await fetch("/api/candidates", {
              method: "DELETE",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                candidate_id: target.remoteCandidateId || candidateId,
                analysis_id: target.remoteAnalysisId || null,
              }),
            });
          }
        } catch (error) {
          console.error("[remote-candidate-delete-error]", error);
          alert("공통 저장 후보자 삭제 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
          return;
        }

        const localCandidates = getLocalCandidatesForPosition(selectedPositionId);
        setCandidatesForPosition(
          selectedPositionId,
          localCandidates.filter((candidate) => candidate.id !== candidateId)
        );

        const sessionKey = getSessionKey(selectedPositionId, candidateId);
        delete formStateBySession[sessionKey];

        const allCustomQuestions = getAllCustomQuestions();
        delete allCustomQuestions[sessionKey];
        setAllCustomQuestions(allCustomQuestions);

        const scorePrefix = getScorePrefix(selectedPositionId, candidateId);
        Object.keys(selectedScores).forEach((key) => {
          if (key.startsWith(scorePrefix)) delete selectedScores[key];
        });

        if (selectedCandidateId === candidateId) {
          selectedCandidateId = "";
          currentPage = "landing";
        }

        await loadRemoteCandidates(true);
        render();
      }

      function initializeFromUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const positionId = params.get("positionId");
        const candidateId = params.get("candidateId");

        if (!positionId || !candidateId) return;

        const positionExists = window.INTERVIEW_DATA.positions.some(
          (position) => position.id === positionId
        );

        if (!positionExists) return;

        selectedPositionId = positionId;

        loadRemoteCandidates(true).then(() => {
          const candidateExists = getCandidatesForPosition(positionId).some(
            (candidate) => candidate.id === candidateId
          );

          if (!candidateExists) return;

          selectedCandidateId = candidateId;
          const candidate = getSelectedCandidate();
          seedCandidateSession(candidate);

          const selected = getSelectedPosition();
          activeNav = selected?.competencies?.[0]?.id || "final-review";
          currentPage = "guide";

          window.history.replaceState({}, document.title, window.location.pathname);
          render();
        });
      }

      window.openCandidateModal = openCandidateModal;
      window.closeCandidateModal = closeCandidateModal;
      window.openCandidateGuide = openCandidateGuide;
      window.openAddCandidateModal = openAddCandidateModal;
      window.closeAddCandidateModal = closeAddCandidateModal;
      window.updateNewCandidateName = updateNewCandidateName;
      window.addCandidateDirectly = addCandidateDirectly;
      window.deleteCandidate = deleteCandidate;
      window.goAiResumeAnalysis = goAiResumeAnalysis;
      window.goLanding = goLanding;
      window.scrollToSection = scrollToSection;
      window.scrollToTop = scrollToTop;
      window.toggleJdFitEvidence = toggleJdFitEvidence;
      window.toggleAiBriefCollapsed = toggleAiBriefCollapsed;
      window.openPdfPreview = openPdfPreview;
      window.closePdfPreview = closePdfPreview;
      window.openCautionModal = openCautionModal;
      window.closeCautionModal = closeCautionModal;
      window.openDraftModal = openDraftModal;
      window.closeDraftModal = closeDraftModal;
      window.openCustomQuestionModal = openCustomQuestionModal;
      window.closeCustomQuestionModal = closeCustomQuestionModal;
      window.updateCustomQuestionForm = updateCustomQuestionForm;
      window.saveCustomQuestion = saveCustomQuestion;
      window.deleteCustomQuestion = deleteCustomQuestion;
      window.setQuestionScore = setQuestionScore;
      window.setQuestionMemo = setQuestionMemo;
      window.updateFormField = updateFormField;
      window.setFinalDecision = setFinalDecision;
      window.downloadPdf = downloadPdf;
      window.saveDraft = saveDraft;
      window.loadDraft = loadDraft;
      window.deleteDraft = deleteDraft;
      window.resetCurrentEvaluation = resetCurrentEvaluation;

      initializeFromUrlParams();
      render();

      let scrollSpyTicking = false;

      window.addEventListener("scroll", () => {
        if (scrollSpyTicking) return;

        scrollSpyTicking = true;
        requestAnimationFrame(() => {
          handleScrollSpy();

          const shouldShow =
            currentPage === "guide" &&
            window.scrollY > 900 &&
            !showPdfPreview &&
            !showCautionModal &&
            !showDraftModal &&
            !showCustomQuestionModal &&
            !showCandidateModal &&
            !showAddCandidateModal;

          if (shouldShow !== showScrollTopButton) {
            showScrollTopButton = shouldShow;
            render();
          }

          scrollSpyTicking = false;
        });
      });
    </script>
  </body>
</html>
